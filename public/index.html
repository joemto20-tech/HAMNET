body{overflow:hidden;background:#000;}
#terminal{
 perspective:1200px;
 transform:perspective(1400px) rotateX(.6deg) scale(1.01);
 filter:contrast(1.08) brightness(1.02);
}
#terminal::before{
 content:"";
 position:absolute;inset:0;
 pointer-events:none;
 background:
 radial-gradient(circle at center, transparent 58%, rgba(0,0,0,.28) 100%),
 repeating-linear-gradient(to bottom, rgba(255,255,255,.015) 0 2px, rgba(0,0,0,.06) 2px 4px);
 mix-blend-mode:screen;
 animation:flicker 7s infinite steps(1), roll 9s linear infinite;
}
#terminal::after{
 content:"";
 position:absolute;inset:-2%;
 pointer-events:none;
 border-radius:18px;
 box-shadow: inset 0 0 80px rgba(0,0,0,.45), inset 0 0 140px rgba(76,255,145,.08);
}
@keyframes flicker{
 0%,96%,100%{opacity:.95}
 97%{opacity:.75}
 98%{opacity:1}
 99%{opacity:.82}
}
@keyframes roll{
 0%{background-position:0 -100vh,0 0}
 100%{background-position:0 100vh,0 0}
}
.glitch{
 animation:glitch .18s steps(2) 1;
}
@keyframes glitch{
 0%{transform:translateX(0)}
 20%{transform:translateX(-8px)}
 40%{transform:translateX(7px)}
 60%{transform:translateX(-4px)}
 100%{transform:translateX(0)}
}


/* ========================================
   NVMP TERMINAL ENHANCED STYLING v2.0
   Larger text, stronger CRT realism
   ======================================== */

/* Base font size bump - everything scales up */
#terminal {
  font-size: 15px;
}

/* Headers - much more imposing */
.pip-title {
  font-size: 20px !important;
  letter-spacing: 4px !important;
  text-shadow: 0 0 12px rgba(76,255,145,0.6), 0 0 24px rgba(76,255,145,0.2) !important;
}
.pip-sub {
  font-size: 13px !important;
  letter-spacing: 2px !important;
}
.pip-footer {
  font-size: 13px !important;
  padding: 7px 12px !important;
}
.pip-header {
  padding: 10px 0 7px !important;
}

/* Sidebar items - legible */
.list-item {
  font-size: 14px !important;
  padding: 8px 10px !important;
  line-height: 1.4 !important;
}
.list-item.selected {
  text-shadow: 0 0 8px rgba(76,255,145,0.5) !important;
}

/* Content body text */
.text-body {
  font-size: 15px !important;
  line-height: 1.85 !important;
}
.text-body p {
  margin-bottom: 8px !important;
}

/* Menu buttons */
.menu-btn {
  font-size: 13px !important;
  padding: 11px 6px !important;
  letter-spacing: 1.5px !important;
}

/* Control buttons */
.ctrl-btn {
  font-size: 12px !important;
  padding: 7px 16px !important;
  letter-spacing: 1.5px !important;
}

/* Notes/textarea */
.note-area {
  font-size: 14px !important;
  line-height: 1.7 !important;
  padding: 10px !important;
  min-height: 120px !important;
}

/* Checklist items */
.checklist-item {
  font-size: 14px !important;
  padding: 8px 10px !important;
}

/* RADD banner */
.radd-banner {
  font-size: 13px !important;
  padding: 6px !important;
  letter-spacing: 1px !important;
}

/* Messages */
.msg-center {
  font-size: 14px !important;
  letter-spacing: 1px !important;
}
.msg-denied {
  font-size: 16px !important;
  letter-spacing: 2px !important;
}

/* Seal ring */
.seal-ring {
  font-size: 18px !important;
  width: 66px !important;
  height: 66px !important;
  line-height: 62px !important;
  text-shadow: 0 0 10px rgba(76,255,145,0.5) !important;
}

/* Code digits - lock screen */
.code-digit {
  font-size: 32px !important;
  width: 52px !important;
  height: 64px !important;
}

/* Logo subtitle */
.logo-sub {
  font-size: 18px !important;
  letter-spacing: 6px !important;
  text-shadow: 0 0 12px rgba(76,255,145,0.7) !important;
}

/* Progress bar - thicker */
.progress-bar-outer {
  height: 16px !important;
}

/* Sidebar wider to handle text */
.sidebar {
  width: 280px !important;
  padding: 12px !important;
}

/* Content padding */
.content {
  padding: 22px !important;
}

/* Pip frame margins */
.pip-frame {
  margin: 6px !important;
}

/* Enhanced CRT phosphor glow on active text */
#terminal .list-item.selected,
#terminal .menu-btn.selected,
#terminal .ctrl-btn.primary {
  text-shadow: 0 0 6px rgba(76,255,145,0.8) !important;
}

/* Subtle text glow on all green text for phosphor feel */
#terminal {
  text-shadow: 0 0 3px rgba(76,255,145,0.15);
}

/* Stronger inner vignette for CRT bowl effect */
#terminal::after {
  box-shadow: 
    inset 0 0 100px rgba(0,0,0,0.5),
    inset 0 0 200px rgba(76,255,145,0.04),
    inset 0 0 4px rgba(76,255,145,0.12) !important;
}

/* More pronounced scanlines */
.scanline {
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 2px,
    rgba(0,0,0,0.12) 2px,
    rgba(0,0,0,0.12) 4px
  ) !important;
}

/* Stronger border glow */
#terminal {
  border-color: #3a7a50 !important;
  box-shadow: 
    inset 0 0 140px rgba(76,255,145,0.06),
    0 0 30px rgba(76,255,145,0.04),
    0 0 2px rgba(76,255,145,0.3) !important;
}

/* Access granted text larger */
#screen [style*="ACCESS GRANTED"] {
  font-size: 22px !important;
}

.comms-box {
  border: 1px solid #2a6640;
  background: rgba(13,46,26,0.18);
  padding: 8px 10px;
}

.comms-label {
  color: #2a9155;
  font-size: 11px;
  letter-spacing: 2px;
}

.comms-value {
  color: #4cff91;
  font-size: 16px;
  margin-top: 4px;
}

.comms-bars {
  display: flex;
  gap: 3px;
  align-items: flex-end;
  height: 18px;
  margin-top: 5px;
}

.comms-bars span {
  display: block;
  width: 8px;
  background: #4cff91;
  box-shadow: 0 0 8px rgba(76,255,145,.5);
  animation: commsBars 1.2s infinite steps(2);
}

.comms-bars span:nth-child(1){height:25%; animation-delay:.1s}
.comms-bars span:nth-child(2){height:45%; animation-delay:.3s}
.comms-bars span:nth-child(3){height:65%; animation-delay:.2s}
.comms-bars span:nth-child(4){height:85%; animation-delay:.4s}
.comms-bars span:nth-child(5){height:100%; animation-delay:.15s}

@keyframes commsBars {
  0%,100%{opacity:.45}
  50%{opacity:1}
}

.comms-waterfall {
  height: 42px;
  border: 1px solid #2a6640;
  margin-top: 10px;
  background:
    repeating-linear-gradient(90deg, rgba(76,255,145,.1) 0 2px, transparent 2px 12px),
    linear-gradient(to right, transparent, rgba(76,255,145,.16), transparent);
  animation: commsSweep 3s linear infinite;
}

@keyframes commsSweep {
  from { background-position: 0 0, -260px 0; }
  to { background-position: 80px 0, 260px 0; }
}


/* HAM OS 4.0 AUDIO + CRT IMMERSION */
#terminal.audio-flash {
  animation: audioFlash .16s steps(2) 1;
}

#terminal.boot-warm {
  animation: bootWarm 1.8s ease-out 1;
}

#terminal.static-hit::before {
  opacity: 1 !important;
  background:
    repeating-linear-gradient(to bottom, rgba(76,255,145,.25) 0 2px, rgba(0,0,0,.22) 2px 4px),
    repeating-linear-gradient(90deg, rgba(255,255,255,.08) 0 1px, transparent 1px 6px) !important;
}

@keyframes audioFlash {
  0% { filter: contrast(1.8) brightness(1.5); transform: translateX(-2px); }
  50% { filter: contrast(1.25) brightness(1.18); transform: translateX(2px); }
  100% { filter: contrast(1.08) brightness(1.02); transform: translateX(0); }
}

@keyframes bootWarm {
  0% { opacity: .15; filter: brightness(.35) contrast(1.8) blur(1px); }
  45% { opacity: .78; filter: brightness(1.6) contrast(1.35) blur(.4px); }
  100% { opacity: 1; filter: brightness(1.02) contrast(1.08) blur(0); }
}

.audio-toggle {
  position: absolute;
  right: 10px;
  bottom: 60px;
  z-index: 20;
  border: 1px solid #2a6640;
  background: rgba(3,7,5,.86);
  color: #2a9155;
  font-family: 'Courier New', monospace;
  font-size: 10px;
  padding: 5px 8px;
  cursor: pointer;
  letter-spacing: 1px;
}

.audio-toggle.on {
  color: #4cff91;
  border-color: #4cff91;
  text-shadow: 0 0 8px rgba(76,255,145,.45);
}

body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 24px;
  z-index: 9998;
  -webkit-app-region: drag;
}
button, input, textarea, select, .sidebar, .content, .controls, .audio-toggle, .terminal-notification, .terminal-frame-buttons {
  -webkit-app-region: no-drag;
}
.frame-btn {
  position: absolute;
  left: var(--frame-btn-x);
  top: var(--frame-btn-y);
  width: var(--frame-btn-w);
  height: var(--frame-btn-h);
  transform: translate(-50%, -50%);
  border-radius: 50% !important;
  border: 1px solid color-mix(in srgb, var(--frame-accent) 34%, transparent) !important;
  background:
    radial-gradient(ellipse at 46% 42%, color-mix(in srgb, var(--frame-accent) 58%, #ffffff), color-mix(in srgb, var(--frame-accent) 20%, transparent) 38%, rgba(0,0,0,.12) 70%) !important;
  box-shadow:
    0 0 12px color-mix(in srgb, var(--frame-accent) 35%, transparent),
    inset 0 0 12px rgba(255,255,255,.12),
    inset 0 -9px 12px rgba(0,0,0,.48) !important;
  color: var(--frame-accent) !important;
  cursor: pointer;
  font-size: 0 !important;
  padding: 0 !important;
  opacity: .72;
  pointer-events: auto;
}
#frame-back-button {
  --frame-btn-x: 31.65%;
  --frame-btn-y: 86.75%;
  --frame-btn-w: 4.75%;
  --frame-btn-h: 6.35%;
}
#terminal-power-switch {
  --frame-btn-x: 41.25%;
  --frame-btn-y: 89.35%;
  --frame-btn-w: 7.25%;
  --frame-btn-h: 9.85%;
}
#frame-theme-button {
  --frame-btn-x: 53.20%;
  --frame-btn-y: 89.75%;
  --frame-btn-w: 6.85%;
  --frame-btn-h: 9.30%;
}
#frame-audio-button {
  --frame-btn-x: 64.05%;
  --frame-btn-y: 89.75%;
  --frame-btn-w: 6.85%;
  --frame-btn-h: 9.30%;
}
#frame-exit-button {
  --frame-btn-x: 72.85%;
  --frame-btn-y: 86.75%;
  --frame-btn-w: 4.85%;
  --frame-btn-h: 6.45%;
}
.frame-btn::after {
  content: attr(data-label);
  position: absolute;
  left: 50%;
  top: calc(100% + 3px);
  transform: translateX(-50%);
  color: var(--frame-accent);
  font-family: 'Courier New', monospace;
  font-size: clamp(7px, .72vw, 9px);
  line-height: 1;
  letter-spacing: 1px;
  text-shadow: 0 0 8px var(--frame-glow), 0 1px 2px #000;
  white-space: nowrap;
}
.frame-btn:hover,
.frame-btn:focus-visible {
  opacity: .96;
  outline: none;
  border-color: color-mix(in srgb, var(--frame-accent) 58%, transparent) !important;
  box-shadow:
    0 0 18px var(--frame-glow),
    0 0 34px color-mix(in srgb, var(--frame-accent) 22%, transparent),
    inset 0 0 14px rgba(255,255,255,.18),
    inset 0 -9px 12px rgba(0,0,0,.48) !important;
}
.frame-main {
  opacity: .92;
  animation: frameMainPulse 2.6s ease-in-out infinite;
}
.frame-small {
  opacity: .58;
}
.frame-exit:hover,
.frame-exit:focus-visible {
  border-color: rgba(255,90,77,.45) !important;
  color: #ff5a4d !important;
  box-shadow:
    0 0 18px rgba(255,90,77,.38),
    inset 0 0 14px rgba(255,255,255,.13),
    inset 0 -9px 12px rgba(0,0,0,.48) !important;
}
@keyframes frameMainPulse {
  0%, 100% { filter: brightness(.96); }
  50% { filter: brightness(1.28); }
}
.frame-color-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 8px;
  margin-top: 8px;
}
.frame-color-card {
  border: 1px solid var(--term-line);
  background: var(--term-panel);
  color: var(--term-mid);
  padding: 9px 10px;
  cursor: pointer;
}
.frame-color-card.selected {
  border-color: var(--term-main);
  color: var(--term-main);
  box-shadow: 0 0 12px var(--term-glow), inset 4px 0 0 var(--term-main);
}
.frame-color-card .theme-swatch {
  margin-right: 7px;
}
@supports not (color: color-mix(in srgb, red, transparent)) {
  #screen { box-shadow: inset 0 0 54px rgba(0,0,0,.82), inset 0 0 18px rgba(76,255,145,.10); }
  .terminal-frame-overlay::after { background: radial-gradient(ellipse at 50% 44%, transparent 42%, rgba(76,255,145,.14) 60%, transparent 73%); }
}
@media (max-width: 760px) {
  :root {
    --frame-pad-top: 34px;
    --frame-pad-side: 38px;
    --frame-pad-bottom: 104px;
  }
  .frame-btn::after { font-size: 8px; }
}

function normalizeMapName(name) {
  return String(name || "")
    .toLowerCase()
    .replace(/\([^)]*\)/g, "")
    .replace(/['’]/g, "")
    .replace(/[^a-z0-9]+/g, " ")
    .replace(/\bthe\b/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

function getManualAnchorForName(name) {
  var n = normalizeMapName(name);
  if (ATK_MAP_ANCHORS[n]) return ATK_MAP_ANCHORS[n];

  var keys = Object.keys(ATK_MAP_ANCHORS);
  for (var i = 0; i < keys.length; i++) {
    if (n.indexOf(keys[i]) >= 0 || keys[i].indexOf(n) >= 0) {
      return ATK_MAP_ANCHORS[keys[i]];
    }
  }

  return null;
}

function getAnchoredMojaveLocations() {
  return getAllMapLocations()
    .map(function(p) {
      var anchor = getManualAnchorForName(p.name);
      if (!anchor) return null;
      var copy = Object.assign({}, p);
      copy.mapX = anchor.x;
      copy.mapY = anchor.y;
      return copy;
    })
    .filter(Boolean);
}

function slugMapId(value) {
  return String(value || "unknown").toLowerCase().replace(/[^a-z0-9]+/g, "_").replace(/^_+|_+$/g, "") || "unknown";
}

function getMapLocationTypeLabel(type) {
  if (type === "player_home") return "PLAYER HOMES";
  if (type === "mail_drop") return "MAIL ROUTE";
  if (type === "capture_point") return "CAPTURE POINTS";
  if (type === "protection_route") return "CAPTURE POINTS";
  return String(type || "unknown").replace(/_/g, " ").toUpperCase();
}

function normalizeMapFilterKey(value) {
  return String(value || "").toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-+|-+$/g, "");
}

function mapLocationHasTag(loc, tag) {
  var target = normalizeMapFilterKey(tag);
  return (loc.tags || []).some(function(t) { return normalizeMapFilterKey(t) === target; });
}

function isMailDropLocation(loc) {
  return !!(loc && (loc.mailDrop || loc.mail_drop || loc.deliveryStop || loc.delivery_stop || mapLocationHasTag(loc, "mail-drop") || mapLocationHasTag(loc, "mail-route")));
}

function isPlayerHomeLocation(loc) {
  return !!(loc && (loc.playerHome || loc.player_home || loc.type === "house" || mapLocationHasTag(loc, "player-home") || mapLocationHasTag(loc, "live-house") || mapLocationHasTag(loc, "radd-house")));
}

function isProtectionRouteLocation(loc) {
  return !!(loc && (loc.protectionRoutePoint || loc.capturePoint || loc.capture_point || mapLocationHasTag(loc, "protection-route") || mapLocationHasTag(loc, "capture-point") || mapLocationHasTag(loc, "route-point")));
}

function getActiveRaddMap() {
  return (MAP_RADD_MAPS || []).find(function(m) { return m.id === MAP_ACTIVE_ID; }) || (MAP_RADD_MAPS && MAP_RADD_MAPS[0]) || { id: "mojave", label: "Mojave", asset: MAP_SOURCE_IMAGE };
}

function setActiveRaddMap(mapId) {
  MAP_ACTIVE_ID = mapId || "mojave";
  var map = getActiveRaddMap();
  MAP_SOURCE_IMAGE = map.asset || MAP_SOURCE_IMAGE;
  selected = 0;
  resetMapPan();
  renderMap();
}

function isLocationOnActiveMap(loc) {
  if (!loc || !loc.mapId) return MAP_ACTIVE_ID === "mojave";
  return loc.mapId === MAP_ACTIVE_ID;
}

function getMapLocationMatchesFilter(loc) {
  if (MAP_LOCATION_FILTER_TYPE === "all") return true;
  if (MAP_LOCATION_FILTER_TYPE === "player_home") return isPlayerHomeLocation(loc);
  if (MAP_LOCATION_FILTER_TYPE === "capture_point" || MAP_LOCATION_FILTER_TYPE === "protection_route") return isProtectionRouteLocation(loc);
  return loc.type === MAP_LOCATION_FILTER_TYPE;
}

function inferMapRegion(name) {
  var anchor = getManualAnchorForName(name);
  if (!anchor) return "Mojave";
  var n = normalizeMapName(name);
  if (n.indexOf("primm") >= 0) return "Primm";
  if (n.indexOf("goodsprings") >= 0) return "Goodsprings";
  if (n.indexOf("freeside") >= 0) return "Freeside";
  if (n.indexOf("black mountain") >= 0) return "Black Mountain";
  if (n.indexOf("searchlight") >= 0) return "Searchlight";
  if (n.indexOf("jacobstown") >= 0) return "Jacobstown";
  if (n.indexOf("bonnie springs") >= 0) return "Bonnie Springs";
  if (n.indexOf("mojave outpost") >= 0) return "Mojave Outpost";
  return "Mojave";
}

function isHamFactionName(name) {
  var n = normalizeMapName(name);
  return n.indexOf("ham") >= 0 || n.indexOf("humans accepting mutation") >= 0 || n.indexOf("high counsel") >= 0;
}

function adaptLegacyMapLocation(p) {
  // Compatibility adapter: old RADD/live ownership markers are converted into
  // the same schema as public/DATA/map_locations.json so the map can render both.
  var type = isHamFactionName(p.owner) ? "ham_base" : "faction_base";
  return {
    id: "radd_" + slugMapId(p.owner) + "_" + slugMapId(p.name),
    name: p.name || "Unknown Site",
    type: type,
    faction: p.owner || "unknown",
    region: inferMapRegion(p.name),
    x: Number(p.mapX || p.x || 50),
    y: Number(p.mapY || p.y || 50),
    mapX: Number(p.mapX || p.x || 50),
    mapY: Number(p.mapY || p.y || 50),
    icon: type === "ham_base" ? "ham_base" : "flag",
    tags: [type, "radd", "live-ownership", "capture-point", "protection-route", "route-point", slugMapId(p.owner), slugMapId(p.name)].filter(Boolean),
    description: "Live RADD ownership marker converted into the HAM OS map index schema.",
    source: "radd",
    owner: p.owner,
    color: p.color || "#4cff91",
    safe: !!p.safe,
    locked: !!p.locked,
    isHq: !!p.isHq,
    hqName: p.hqName || ""
  };
}

function getIndexedMapLocationsForRender() {
  var rows = [];
  if (window.HAM_MAP_INDEX && Array.isArray(window.HAM_MAP_INDEX.locations)) {
    rows = window.HAM_MAP_INDEX.locations.map(function(loc) {
      return Object.assign({}, loc, {
        mapId: loc.mapId || "mojave",
        mapX: Number(loc.mapX !== undefined ? loc.mapX : loc.x),
        mapY: Number(loc.mapY !== undefined ? loc.mapY : loc.y),
        color: loc.color || (loc.faction === "HAM" ? "#4cff91" : "#45b8ff"),
        source: loc.source || "json"
      });
    });
  }
  return rows;
}

function getMapRenderLocations() {
  var byId = {};
  getIndexedMapLocationsForRender().filter(isLocationOnActiveMap).forEach(function(loc) {
    byId[loc.id] = loc;
  });
  if (MAP_ACTIVE_ID === "mojave") {
    getAnchoredMojaveLocations().map(adaptLegacyMapLocation).forEach(function(loc) {
      if (!byId[loc.id]) byId[loc.id] = loc;
    });
  }
  getRaddHousePointsForRender().forEach(function(loc) { addMapLocationByIdOrName(byId, loc); });
  getRaddCapturePointsForRender().forEach(function(loc) { byId[loc.id] = loc; });

  var rows = Object.keys(byId).map(function(id) { return byId[id]; }).filter(function(loc) {
    if (!getMapLocationMatchesFilter(loc)) return false;
    if (MAP_LOCATION_SEARCH_QUERY) {
      var hay = [loc.id, loc.name, loc.type, loc.faction, loc.region, loc.icon, loc.description, loc.deliveryName, loc.stopCode, loc.mailRoute, loc.baseId, loc.linkedId].concat(loc.tags || []).join(" ").toLowerCase();
      if (hay.indexOf(MAP_LOCATION_SEARCH_QUERY.toLowerCase()) < 0) return false;
    }
    return isFinite(loc.mapX) && isFinite(loc.mapY);
  });

  return rows.sort(function(a, b) {
    if (isMailDropLocation(a) && !isMailDropLocation(b)) return -1;
    if (isMailDropLocation(b) && !isMailDropLocation(a)) return 1;
    if (a.type === "house" && b.type !== "house") return -1;
    if (b.type === "house" && a.type !== "house") return 1;
    return String(a.name).localeCompare(String(b.name));
  });
}

function getMapBlipSymbol(loc) {
  if (!loc) return "?";
  if (loc.type === "house") return "H";
  if (loc.type === "job") return "J";
  if (isMailDropLocation(loc) && loc.type !== "house") return "M";
  if (loc.type === "ham_base") return "HAM";
  if (loc.type === "faction_base") return "F";
  if (loc.type === "vendor") return "$";
  if (loc.type === "radio" || loc.type === "broadcast") return "R";
  if (loc.type === "checkpoint") return "C";
  if (loc.type === "enemy") return "!";
  return "?";
}

function cycleMapLocationFilter() {
  var idx = MAP_LOCATION_FILTER_TYPES.indexOf(MAP_LOCATION_FILTER_TYPE);
  MAP_LOCATION_FILTER_TYPE = MAP_LOCATION_FILTER_TYPES[(idx + 1) % MAP_LOCATION_FILTER_TYPES.length];
  selected = 0;
  renderMap();
}

function setMapLocationFilter(type, keepSearch) {
  MAP_LOCATION_FILTER_TYPE = type || "all";
  if (!keepSearch) MAP_LOCATION_SEARCH_QUERY = "";
  selected = 0;
  renderMap();
}

async function loadMapProtectionRoutes(force) {
  if (MAP_PROTECTION_ROUTES.length && !force) return MAP_PROTECTION_ROUTES;
  try {
    var res = await fetch("DATA/map_routes.json", { cache: "no-store" });
    if (!res.ok) throw new Error("Map routes returned " + res.status);
    var data = await res.json();
    MAP_RADD_MAPS = Array.isArray(data.maps) ? data.maps : [];
    if (!MAP_ACTIVE_ID) MAP_ACTIVE_ID = data.defaultMapId || "mojave";
    var activeMap = getActiveRaddMap();
    MAP_SOURCE_IMAGE = (activeMap && activeMap.asset) || data.mapImage || data.map_image || MAP_SOURCE_IMAGE;
    MAP_PROTECTION_ROUTES = Array.isArray(data.routes) ? data.routes : [];
    MAP_RADD_CAPTURE_POINTS = Array.isArray(data.capturePoints) ? data.capturePoints : [];
    MAP_RADD_HOUSE_POINTS = Array.isArray(data.houseMarkers) ? data.houseMarkers : (Array.isArray(data.houses) ? data.houses : []);
    return MAP_PROTECTION_ROUTES;
  } catch (e) {
    MAP_PROTECTION_ROUTES = [];
    return MAP_PROTECTION_ROUTES;
  }
}

function getRaddCapturePointsForRender() {
  if (!MAP_RADD_CAPTURE_POINTS.length) return [];
  if (MAP_LOCATION_FILTER_TYPE !== "capture_point" && MAP_LOCATION_FILTER_TYPE !== "protection_route" && !MAP_LOCATION_SEARCH_QUERY) return [];
  return MAP_RADD_CAPTURE_POINTS.filter(isLocationOnActiveMap).map(function(loc) {
    return Object.assign({}, loc, {
      mapX: Number(loc.mapX !== undefined ? loc.mapX : loc.x),
      mapY: Number(loc.mapY !== undefined ? loc.mapY : loc.y),
      source: "radd-route",
      color: loc.color || "#b38042",
      protectionRoutePoint: true
    });
  });
}

function getRaddHousePointsForRender() {
  if (!MAP_RADD_HOUSE_POINTS.length) return [];
  if (MAP_LOCATION_FILTER_TYPE !== "player_home" && MAP_LOCATION_FILTER_TYPE !== "house" && !MAP_LOCATION_SEARCH_QUERY) return [];
  return MAP_RADD_HOUSE_POINTS.filter(isLocationOnActiveMap).map(function(loc) {
    return Object.assign({}, loc, {
      type: "house",
      mapX: Number(loc.mapX !== undefined ? loc.mapX : loc.x),
      mapY: Number(loc.mapY !== undefined ? loc.mapY : loc.y),
      source: "radd-house",
      color: loc.color || "#4cff91",
      mailDrop: true,
      tags: (loc.tags || []).concat(["house", "mail-drop", "live-house"])
    });
  });
}

function addMapLocationByIdOrName(byId, loc) {
  var locName = normalizeMapName(loc && loc.name);
  if (locName) {
    var ids = Object.keys(byId);
    for (var i = 0; i < ids.length; i++) {
      var existing = byId[ids[i]];
      if (existing && normalizeMapName(existing.name) === locName && existing.type === loc.type) {
        byId[ids[i]] = Object.assign({}, existing, loc, {
          id: existing.id,
          tags: (existing.tags || []).concat(loc.tags || []).filter(function(tag, idx, arr) { return arr.indexOf(tag) === idx; })
        });
        return;
      }
    }
  }
  byId[loc.id] = loc;
}

function getMapLocationLookup(locations) {
  var byId = {};
  var byName = {};
  (locations || []).forEach(function(loc) {
    byId[String(loc.id)] = loc;
    byName[normalizeMapName(loc.name)] = loc;
  });
  return { byId: byId, byName: byName };
}

function resolveMapRoutePoint(point, lookup) {
  if (!point) return null;
  var loc = null;
  if (point.locationId) loc = lookup.byId[String(point.locationId)];
  if (!loc && point.id) loc = lookup.byId[String(point.id)];
  if (!loc && point.name) loc = lookup.byName[normalizeMapName(point.name)];
  var x = loc ? Number(loc.mapX || loc.x) : Number(point.x);
  var y = loc ? Number(loc.mapY || loc.y) : Number(point.y);
  if (!isFinite(x) || !isFinite(y)) return null;
  return { x: Math.max(0, Math.min(100, x)), y: Math.max(0, Math.min(100, y)), label: point.label || point.name || (loc && loc.name) || "ROUTE POINT" };
}

function getMapProtectionRoutesForRender(locations) {
  var lookup = getMapLocationLookup(locations);
  return (MAP_PROTECTION_ROUTES || []).filter(function(route) { return !route.mapId || route.mapId === MAP_ACTIVE_ID; }).map(function(route) {
    var points = (route.points || []).map(function(point) { return resolveMapRoutePoint(point, lookup); }).filter(Boolean);
    return Object.assign({}, route, { points: points });
  }).filter(function(route) { return route.points.length >= 2; });
}

function getMapRouteColor(route) {
  if (!route) return "#ffb84d";
  var fields = ["color", "colour", "lineColor", "line_color", "routeColor", "route_color", "stroke", "strokeColor", "stroke_color", "borderColor", "border_color"];
  for (var i = 0; i < fields.length; i++) {
    var value = route[fields[i]];
    if (value !== undefined && value !== null && String(value).trim()) return String(value).trim();
  }
  var nested = [route.style, route.meta, route.raw];
  for (var n = 0; n < nested.length; n++) {
    var obj = nested[n];
    if (!obj) continue;
    for (var j = 0; j < fields.length; j++) {
      var nestedValue = obj[fields[j]];
      if (nestedValue !== undefined && nestedValue !== null && String(nestedValue).trim()) return String(nestedValue).trim();
    }
  }
  return "#ffb84d";
}

function renderMapRouteSegments(surface, routes) {
  if (!MAP_ROUTE_LAYER_ENABLED || !routes.length) return;
  routes.forEach(function(route) {
    for (var i = 0; i < route.points.length - 1; i++) {
      var a = route.points[i];
      var b = route.points[i + 1];
      var dx = b.x - a.x;
      var dy = b.y - a.y;
      var len = Math.sqrt(dx * dx + dy * dy);
      var angle = Math.atan2(dy, dx) * 180 / Math.PI;
      var seg = document.createElement("div");
      seg.className = "map-route-segment type-" + normalizeMapFilterKey(route.type || "protection");
      seg.style.left = a.x + "%";
      seg.style.top = a.y + "%";
      seg.style.width = len + "%";
      seg.style.transform = "rotate(" + angle + "deg)";
      seg.style.setProperty("--route-color", getMapRouteColor(route));
      seg.title = route.name || "Protection route";
      surface.appendChild(seg);
    }
  });
}

function cssMapImageUrl(src) {
  src = String(src || "assets/mapmojave.png").replace(/["\\]/g, "");
  return 'url("' + src + '")';
}

function sizeMapSurfaceToCamera(camera, surface) {
  if (!camera || !surface) return;
  var rect = camera.getBoundingClientRect ? camera.getBoundingClientRect() : { width: camera.clientWidth || 0, height: camera.clientHeight || 0 };
  var cw = Number(rect.width || camera.clientWidth || 0);
  var ch = Number(rect.height || camera.clientHeight || 0);
  if (!cw || !ch) return;
  var map = getActiveRaddMap();
  var size = (map && map.size) || {};
  var ratio = Number(size.width || 1) / Math.max(1, Number(size.height || 1));
  if (!isFinite(ratio) || ratio <= 0) ratio = 1;
  var stageW = cw;
  var stageH = cw / ratio;
  if (stageH > ch) {
    stageH = ch;
    stageW = ch * ratio;
  }
  surface.style.setProperty("--map-stage-width", Math.max(1, Math.floor(stageW)) + "px");
  surface.style.setProperty("--map-stage-height", Math.max(1, Math.floor(stageH)) + "px");
}

function resetMapPan() {
  MAP_PAN_X = 0;
  MAP_PAN_Y = 0;
}

function getMapPanLimit(camera, surface) {
  if (!camera || MAP_ZOOM <= 1) return { x: 0, y: 0 };
  sizeMapSurfaceToCamera(camera, surface);
  var cameraRect = camera.getBoundingClientRect ? camera.getBoundingClientRect() : { width: camera.clientWidth || 0, height: camera.clientHeight || 0 };
  var surfaceW = Number(surface && (surface.offsetWidth || parseFloat(getComputedStyle(surface).width)) || cameraRect.width || 0);
  var surfaceH = Number(surface && (surface.offsetHeight || parseFloat(getComputedStyle(surface).height)) || cameraRect.height || 0);
  var cameraW = Number(cameraRect.width || camera.clientWidth || 0);
  var cameraH = Number(cameraRect.height || camera.clientHeight || 0);
  return {
    x: Math.max(0, ((surfaceW * MAP_ZOOM) - cameraW) / 2),
    y: Math.max(0, ((surfaceH * MAP_ZOOM) - cameraH) / 2)
  };
}

function clampMapPan(camera, surface) {
  var limit = getMapPanLimit(camera, surface);
  MAP_PAN_X = Math.max(-limit.x, Math.min(limit.x, MAP_PAN_X));
  MAP_PAN_Y = Math.max(-limit.y, Math.min(limit.y, MAP_PAN_Y));
}

function applyMapPan(surface) {
  if (!surface) return;
  surface.style.setProperty("--map-pan-x", Math.round(MAP_PAN_X) + "px");
  surface.style.setProperty("--map-pan-y", Math.round(MAP_PAN_Y) + "px");
}

function applyMapZoom(surface) {
  if (!surface) return;
  surface.style.setProperty("--map-zoom", MAP_ZOOM);
  surface.style.setProperty("--map-inverse-zoom", (1 / MAP_ZOOM).toFixed(4));
}

function setMapZoom(nextZoom, camera, surface) {
  var oldZoom = MAP_ZOOM;
  nextZoom = Math.max(1, Math.min(3, Math.round(Number(nextZoom || 1) * 100) / 100));
  if (Math.abs(nextZoom - oldZoom) < 0.001) return false;

  MAP_ZOOM = nextZoom;
  if (MAP_ZOOM <= 1) resetMapPan();
  else if (oldZoom > 0) {
    var ratio = MAP_ZOOM / oldZoom;
    MAP_PAN_X *= ratio;
    MAP_PAN_Y *= ratio;
  }

  clampMapPan(camera, surface);
  applyMapZoom(surface);
  applyMapPan(surface);
  if (camera && camera.classList) camera.classList.toggle("pan-disabled", MAP_ZOOM <= 1);

  var readout = document.querySelector("[data-map-zoom-readout]");
  if (readout) readout.textContent = "ZOOM " + Math.round(MAP_ZOOM * 100) + "%";
  return true;
}

function zoomMapByWheel(e) {
  if (screen !== "map") return false;
  var camera = e.target && e.target.closest ? e.target.closest(".atk-map-camera") : null;
  if (!camera) return false;
  var surface = camera.querySelector ? camera.querySelector(".atk-map-surface") : null;
  var step = e.deltaY < 0 ? 0.15 : -0.15;
  var didZoom = setMapZoom(MAP_ZOOM + step, camera, surface);
  if (didZoom) {
    e.preventDefault();
    e.stopPropagation();
  }
  return didZoom;
}

function initializeMapDragPan(camera, surface) {
  if (!camera || !surface) return;
  if (MAP_ZOOM <= 1) resetMapPan();
  clampMapPan(camera, surface);
  applyMapPan(surface);
  camera.classList.toggle("pan-disabled", MAP_ZOOM <= 1);

  camera.addEventListener("click", function(e) {
    if (!MAP_SUPPRESS_NEXT_MAP_CLICK) return;
    MAP_SUPPRESS_NEXT_MAP_CLICK = false;
    e.preventDefault();
    e.stopPropagation();
  }, true);

  camera.addEventListener("pointerdown", function(e) {
    if (MAP_ZOOM <= 1 || e.button !== 0) return;
    MAP_DRAG_STATE = {
      pointerId: e.pointerId,
      startX: e.clientX,
      startY: e.clientY,
      panX: MAP_PAN_X,
      panY: MAP_PAN_Y,
      moved: false
    };
    camera.classList.add("dragging");
    try { camera.setPointerCapture(e.pointerId); } catch(err) {}
  });

  camera.addEventListener("pointermove", function(e) {
    if (!MAP_DRAG_STATE || MAP_DRAG_STATE.pointerId !== e.pointerId) return;
    var dx = e.clientX - MAP_DRAG_STATE.startX;
    var dy = e.clientY - MAP_DRAG_STATE.startY;
    if (Math.abs(dx) + Math.abs(dy) > 3) MAP_DRAG_STATE.moved = true;
    MAP_PAN_X = MAP_DRAG_STATE.panX + dx;
    MAP_PAN_Y = MAP_DRAG_STATE.panY + dy;
    clampMapPan(camera, surface);
    applyMapPan(surface);
    e.preventDefault();
  });

  function finishDrag(e) {
    if (!MAP_DRAG_STATE || (e && MAP_DRAG_STATE.pointerId !== e.pointerId)) return;
    if (MAP_DRAG_STATE.moved) {
      MAP_SUPPRESS_NEXT_MAP_CLICK = true;
      setTimeout(function() { MAP_SUPPRESS_NEXT_MAP_CLICK = false; }, 0);
    }
    MAP_DRAG_STATE = null;
    camera.classList.remove("dragging");
    try { if (e) camera.releasePointerCapture(e.pointerId); } catch(err) {}
  }

  camera.addEventListener("pointerup", finishDrag);
  camera.addEventListener("pointercancel", finishDrag);
  camera.addEventListener("lostpointercapture", finishDrag);
}

function firstTextValue(obj, keys) {
  if (!obj) return "";
  for (var i = 0; i < keys.length; i++) {
    var v = obj[keys[i]];
    if (v === undefined || v === null) continue;

    if (typeof v === "object") {
      var nested = firstTextValue(v, [
        "display_name", "displayName", "name", "character_name", "characterName",
        "username", "user_name", "userName", "discord_name", "discordName",
        "title", "label"
      ]);
      if (nested) return nested;
      continue;
    }

    if (String(v).trim() !== "") return String(v).trim();
  }
  return "";
}

function extractGroupLeader(g) {
  if (!g) return "";

  function nameFromMembership(m) {
    if (!m) return "";
    if (m.character && m.character.name) return m.character.name;
    if (m.character && m.character.display_name) return m.character.display_name;
    return firstTextValue(m, [
      "display_name", "displayName", "name", "character_name", "characterName",
      "username", "user_name", "userName", "discord_name", "discordName"
    ]);
  }

  if (Array.isArray(g.leaders) && g.leaders.length) {
    var leader = g.leaders[0];
    var n = nameFromMembership(leader);
    if (n) return n;
  }

  var direct = firstTextValue(g, [
    "leader_name", "leaderName", "leader",
    "owner_name", "ownerName", "owner",
    "founder_name", "founderName", "founder",
    "created_by_name", "createdByName", "created_by",
    "creator_name", "creatorName",
    "president", "commander", "boss",
    "leader_character", "leaderCharacter",
    "owner_character", "ownerCharacter",
    "creator", "created_by_user"
  ]);

  if (direct) return direct;

  var memberArrays = [
    g.members, g.group_members, g.groupMembers, g.memberships,
    g.character_memberships, g.characterMemberships,
    g.characters, g.users, g.players, g.roster
  ];

  for (var a = 0; a < memberArrays.length; a++) {
    var arr = memberArrays[a];
    if (!Array.isArray(arr)) continue;

    var best = null;
    var bestScore = -999;

    arr.forEach(function(m) {
      var roleText = String(m.role || m.rank || m.role_name || m.roleName || m.title || m.custom_role_text || "").toLowerCase();
      var roleNum = Number(m.role);
      var isLeader =
        roleText.indexOf("leader") >= 0 ||
        roleText.indexOf("owner") >= 0 ||
        roleText.indexOf("founder") >= 0 ||
        roleText.indexOf("president") >= 0 ||
        roleText.indexOf("commander") >= 0 ||
        m.is_leader === true ||
        m.isLeader === true ||
        m.is_owner === true ||
        m.isOwner === true ||
        m.owner === true ||
        m.leader === true;

      var score = 0;
      if (isLeader) score += 100;
      if (!isNaN(roleNum)) score += roleNum;
      if (m.date_joined || m.dateJoined) score += 1;

      if (score > bestScore && nameFromMembership(m)) {
        bestScore = score;
        best = m;
      }
    });

    if (best) return nameFromMembership(best);
  }

  if (String(g.id) === "1129") return "Rotjaw";
  return "";
}

function factionKey(name) {
  return String(name || "").toLowerCase().replace(/^the\s+/, "").trim();
}

function getFactionIntelByName(name) {
  var raw = String(name || "").toLowerCase().trim();
  var simple = factionKey(name);
  return HAM_FACTION_LORE[raw] || HAM_FACTION_LORE[simple] || {
    classification: "Unclassified Wasteland Power",
    disposition: "UNKNOWN",
    contact: "UNKNOWN",
    doctrine: "No doctrine filed.",
    hamNote: "No HAM field note filed yet. Interview, screenshot, and update the archive."
  };
}


function isHamFactionRecord(name, live) {
  var key = factionKey(name);
  if (key === "ham" || key === "high counsel of ham" || key.indexOf("humans accepting mutation") >= 0) return true;
  if (live && String(live.id) === "1129") return true;
  if (live && String(live.owner || "").toLowerCase().indexOf("ham") >= 0) return true;
  return false;
}

function getUserDisposition(name) {
  try {
    var saved = JSON.parse(localStorage.getItem("nvmp_dispositions") || "{}");
    return saved[factionKey(name)] || "UNSET";
  } catch(e) {
    return "UNSET";
  }
}

function setUserDisposition(name, value) {
  try {
    var saved = JSON.parse(localStorage.getItem("nvmp_dispositions") || "{}");
    saved[factionKey(name)] = value;
    localStorage.setItem("nvmp_dispositions", JSON.stringify(saved));
  } catch(e) {}
}

function getCustomFactionNote(name) {
  try {
    var notes = JSON.parse(localStorage.getItem("nvmp_faction_notes") || "{}");
    var key = factionKey(name);
    if (notes[key] !== undefined) return notes[key];
    // Built-in defaults for factions that never get an API description
    var BUILTIN = {
      "80s": "80's Ok?",
      "ham": "HAM is home base. Independent field network documenting the wasteland. Nobody is second class. Protect the archive."
    };
    return BUILTIN[key] || "";
  } catch(e) { return ""; }
}

function setCustomFactionNote(name, text) {
  try {
    var notes = JSON.parse(localStorage.getItem("nvmp_faction_notes") || "{}");
    if (text && text.trim()) notes[factionKey(name)] = text.trim();
    else delete notes[factionKey(name)];
    localStorage.setItem("nvmp_faction_notes", JSON.stringify(notes));
  } catch(e) {}
}

function getApiDescription(record, live, intel) {
  live = live || {};
  intel = intel || getFactionIntelByName(record && record.name);

  var best = getBestGroupDescription(record, live, intel);
  if (best) return best;

  if (isHamFactionRecord(record && record.name, live)) {
    return intel.hamNote || "HAM archive entry online.";
  }

  return "No public API description supplied for this faction.";
}

function getLiveFactionByName(name) {
  var key = factionKey(name);
  var live = LIVE_RADD || DATA.raddSummary || [];
  for (var i = 0; i < live.length; i++) {
    if (factionKey(live[i].owner) === key || factionKey(live[i].name) === key) return live[i];
  }
  return null;
}


function getFactionDescriptor(name, live, intel) {
  intel = intel || getFactionIntelByName(name);
  if (intel && intel.classification && intel.classification !== "Unclassified Wasteland Power") {
    return intel.classification;
  }
  return "NVMP API FACTION";
}

function getAllDatabaseFactions() {
  var out = [];
  var seen = {};

  (LIVE_RADD || []).forEach(function(f) {
    var displayName = getFactionDisplayName(f.owner, f);
    var key = factionKey(displayName);
    var intel = getFactionIntelByName(displayName);
    var leader = getFactionLeader(displayName, f);
    if ((!leader || leader === "UNKNOWN") && String(f.id) === "1129") leader = "Rotjaw";
    seen[key] = true;

    out.push({
      name: displayName,
      status: getUserDisposition(displayName),
      contact: leader,
      leader: leader,
      title: getFactionTitle(displayName, f),
      description: getApiDescription({ name: displayName }, f, intel),
      apiDescription: f.apiDescription || getFactionGroupDescription(displayName, f) || "",
      classification: getFactionDescriptor(displayName, f, intel),
      live: f
    });
  });

  (LIVE_GROUPS || []).forEach(function(g) {
    var displayName = String(g.id) === "1129" ? "HAM" : (g.name || "UNKNOWN GROUP");
    var key = factionKey(displayName);
    if (!seen[key]) {
      var live = getLiveFactionByName(displayName);
      var intel = getFactionIntelByName(displayName);
      var leader = (g.leader && g.leader !== "UNKNOWN") ? g.leader : getFactionLeader(displayName, live);

      seen[key] = true;
      out.push({
        name: displayName,
        status: getUserDisposition(displayName),
        contact: leader,
        leader: leader,
        title: getFactionTitle(displayName, live),
        description: getApiDescription({ name: displayName, apiDescription: g.description }, live, intel),
        apiDescription: g.description || "",
        classification: getFactionDescriptor(displayName, live, intel),
        live: live
      });
    }
  });

  DATA.factions.forEach(function(f) {
    var key = factionKey(f[0]);
    if (!seen[key]) {
      var live = getLiveFactionByName(f[0]);
      var intel = getFactionIntelByName(f[0]);
      var leader = getFactionLeader(f[0], live);

      out.push({
        name: f[0],
        status: getUserDisposition(f[0]),
        contact: leader,
        leader: leader,
        title: getFactionTitle(f[0], live),
        description: getApiDescription({ name: f[0] }, live, intel),
        classification: getFactionDescriptor(f[0], live, intel),
        live: live
      });
    }
  });

  return out;
}

  var items = [];
  var top = getTopLiveFactions(8);
  var ham = findHamLiveFaction();
  var now = new Date().toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});

  if (top[0]) {
    items.push({

    });

  if (ham) {

      text: "HAM network status: " + (ham.count || ham.bases || 0) + " confirmed holdings. HQ: " + (ham.hq || "UNCONFIRMED") + "."
    });
  } else {
    items.push({

    });

    var locked = locs.filter(function(x){ return x.locked; }).length;

    if (safe >= 5) {
      items.push({
        urgent: false,
        text: f.owner + " maintains " + safe + " safe-zone sites. Civilian traffic likely elevated."
      });

    if (locked >= 5) {
      items.push({

  items.push({ urgent:false, text:"Rotjaw protocol reminder: everybody has a name. Slurs, labels, and wasteland shorthand are grounds for hostility." });
  items.push({ urgent:false, text:"Field directive: record faction answers with screenshot or video before submitting to HAM archive." });

  return items;

function commsTime() {

function pick(arr) {

}

function generateCommsLine() {
  var live = LIVE_RADD || DATA.raddSummary || [];

  var f = top.length ? pick(top) : {owner:"UNKNOWN", count:0, hq:"UNKNOWN", locations:[]};
  var locs = f.locations || [];
  var loc = locs.length ? pick(locs) : {name:f.hq || "UNCONFIRMED SITE", safe:false, locked:false};

  var templates = [
    {hot:false, src:"HAM RELAY", text:"Signal check complete. ATK packet stable."},
    {hot:false, src:"FIELD DESK", text:"Logging " + (live.length || "unknown") + " faction records from live territory feed."},
    {hot:true, src:"ATK BURST", text:f.owner + " holding count confirmed at " + (f.count || f.bases || 0) + " sites."},
    {hot:false, src:"MAP GRID", text:"Ping returned from " + loc.name + " // owner: " + f.owner + "."},
    {hot:!!loc.safe, src:"CIVILIAN BAND", text:loc.name + " marked " + (loc.safe ? "SAFE ZONE" : "standard territory") + "."},
    {hot:!!loc.locked, src:"LOCK ALERT", text:loc.name + " capture lock status: " + (loc.locked ? "LOCKED" : "open") + "."},
    {hot:false, src:"ROTJAW", text:"Reminder: everybody has a name. Write that down before somebody loses teeth."},
    {hot:false, src:"NEWSROOM", text:"Field reporters: screenshots or it did not happen."},
    {hot:true, src:"INFLUENCE", text:"Current dominant signal: " + (top[0] ? top[0].owner : "UNKNOWN") + "."}

    templates.push({hot:true, src:"HAM STATUS", text:"HAM holdings confirmed at " + (ham.count || ham.bases || 0) + ". HQ: " + (ham.hq || "UNKNOWN") + "."});
  }

  var t = pick(templates);
  return {
    time: commsTime(),
    source: t.src,
    text: t.text,
    hot: t.hot
  };
}

const HAM_AUDIO = {
  enabled: false,
  ambient: null,
  currentAmbient: "",
  volume: {
    master: Number(localStorage.getItem("ham_audio_volume_master") || 0.55),
    ambient: 0.20,
    fx: Number(localStorage.getItem("ham_audio_volume_fx") || 0.55),

  },
  files: {

    connecting: "assets/sounds/connecting.mp3",
    loading: "assets/sounds/loading.mp3"
  }
};

function clampAudioVolume(value, fallback) {
  value = Number(value);
  if (!isFinite(value)) value = fallback;
  return Math.max(0, Math.min(1, value));
}

function setHamAudioVolume(name, value) {
  if (!HAM_AUDIO.volume.hasOwnProperty(name)) return;
  HAM_AUDIO.volume[name] = clampAudioVolume(value, HAM_AUDIO.volume[name]);
  localStorage.setItem("ham_audio_volume_" + name, HAM_AUDIO.volume[name]);
  if (HAM_AUDIO.ambient) HAM_AUDIO.ambient.volume = HAM_AUDIO.volume.master * HAM_AUDIO.volume.ambient;
  if (typeof applyHamnetRadioAudioState === "function") applyHamnetRadioAudioState();
}

function getHamAudioVolumePercent(name) {
  return Math.round(clampAudioVolume(HAM_AUDIO.volume[name], 0) * 100);
}

function audioInit() {
  if (HAM_AUDIO.enabled) return;
  HAM_AUDIO.enabled = true;

  var terminal = document.getElementById("terminal");
  terminal.classList.add("boot-warm");
  setTimeout(function(){ terminal.classList.remove("boot-warm"); }, 1900);

  playSound("boot");

  updateAudioToggle();
}

function playSound(name, volumeBoost) {
  if (!HAM_AUDIO.enabled && name !== "boot") return;

  try {
    var src = HAM_AUDIO.files[name];
    if (!src) return;

    var a = new Audio(src);
    a.volume = Math.max(0, Math.min(1, HAM_AUDIO.volume.master * HAM_AUDIO.volume.fx * (volumeBoost || 1)));
    a.play().catch(function(){});
  } catch (e) {}
}

function playStaticHit() {
  playSound("connecting", 0.85);
  var terminal = document.getElementById("terminal");
  terminal.classList.add("static-hit");
  terminal.classList.add("audio-flash");
  setTimeout(function(){
    terminal.classList.remove("static-hit");
    terminal.classList.remove("audio-flash");
  }, 180);
}

function setAmbient(name) {
  HAM_AUDIO.currentAmbient = "";
  try {
    if (HAM_AUDIO.ambient) {
      HAM_AUDIO.ambient.pause();
      HAM_AUDIO.ambient = null;
    }
  } catch (e) {}
}

function setAmbientForScreen() {
  setAmbient("");
}

function updateAudioToggle() {
  var btn = document.getElementById("audio-toggle");
  if (!btn) {
    btn = document.createElement("button");
    btn.id = "audio-toggle";
    btn.className = "audio-toggle";
    btn.addEventListener("click", function(){
      if (!HAM_AUDIO.enabled) audioInit();
      else {
        HAM_AUDIO.enabled = false;
        if (typeof stopHamnetRadio === "function") stopHamnetRadio();
        if (HAM_AUDIO.ambient) HAM_AUDIO.ambient.pause();
        HAM_AUDIO.ambient = null;
        HAM_AUDIO.currentAmbient = "";
        updateAudioToggle();
        if (screen === "hamnetAudio") render();
      }
    });
    document.getElementById("terminal").appendChild(btn);
  }

  btn.textContent = HAM_AUDIO.enabled ? "AUDIO ON" : "AUDIO OFF";
  btn.className = "audio-toggle" + (HAM_AUDIO.enabled ? " on" : "");
  var frameAudio = document.getElementById("frame-audio-button");
  if (frameAudio) {
    frameAudio.classList.toggle("on", !!HAM_AUDIO.enabled);
    frameAudio.setAttribute("aria-pressed", HAM_AUDIO.enabled ? "true" : "false");
    frameAudio.title = HAM_AUDIO.enabled ? "Audio on" : "Audio off";
  }
}

function getRecorderMime() {
  var choices = [
    "audio/ogg;codecs=opus",
    "audio/webm;codecs=opus",
    "audio/webm"
  ];

  for (var i = 0; i < choices.length; i++) {
    if (window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(choices[i])) {
      return choices[i];
    }
  }

  return "";
}

function recorderExtension(mime) {
  if (mime.indexOf("ogg") >= 0) return "ogg";
  if (mime.indexOf("webm") >= 0) return "weba";
  return "audio";
}


async function getDefaultMicrophoneStream() {
  REC_ERROR = "";

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    throw new Error("Microphone API unavailable. Electron may need microphone permission enabled.");
  }

  var constraints = {
    audio: {
      deviceId: "default",
      echoCancellation: false,
      noiseSuppression: false,
      autoGainControl: false,
      channelCount: 1
    },
    video: false
  };

  var stream = await navigator.mediaDevices.getUserMedia(constraints);

  try {
    var devices = await navigator.mediaDevices.enumerateDevices();
    var audioInputs = devices.filter(function(d){ return d.kind === "audioinput"; });
    var def = audioInputs.find(function(d){ return d.deviceId === "default"; }) || audioInputs[0];

    if (def && def.label) REC_DEVICE_LABEL = def.label;
    else REC_DEVICE_LABEL = "DEFAULT MICROPHONE";

    console.log("HAM recorder using mic:", REC_DEVICE_LABEL);
  } catch (e) {
    REC_DEVICE_LABEL = "DEFAULT MICROPHONE";
  }

  return stream;
}

async function startHolotapeRecording() {
  try {
    REC_STREAM = await getDefaultMicrophoneStream();
    REC_CHUNKS = [];
    var recMime = getRecorderMime();
    REC_MEDIA = recMime ? new MediaRecorder(REC_STREAM, { mimeType: recMime }) : new MediaRecorder(REC_STREAM);
    REC_MEDIA.hamMime = recMime || "audio/webm";

    REC_MEDIA.ondataavailable = function(e) {
      if (e.data && e.data.size > 0) REC_CHUNKS.push(e.data);
    };

    REC_MEDIA.onstop = function() {
      var blob = new Blob(REC_CHUNKS, { type: REC_MEDIA.hamMime || "audio/webm" });
      if (REC_LAST_URL) URL.revokeObjectURL(REC_LAST_URL);
      REC_LAST_URL = URL.createObjectURL(blob);
      REC_IS_RECORDING = false;
      stopRecMeter();
      render();
    };

    setupRecMeter(REC_STREAM);
    REC_MEDIA.start();
    REC_IS_RECORDING = true;
    playSound("alert", 0.6);
    render();
  } catch (e) {
    REC_ERROR = e.message || String(e); alert("Microphone failed: " + REC_ERROR); render();
  }
}

function stopHolotapeRecording() {
  if (REC_MEDIA && REC_IS_RECORDING) {
    REC_MEDIA.stop();
    if (REC_STREAM) REC_STREAM.getTracks().forEach(function(t){ t.stop(); });
    playSound("back", 0.8);
  }
}

function setupRecMeter(stream) {
  try {
    var ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    var source = ctx.createMediaStreamSource(stream);
    REC_ANALYZER = ctx.createAnalyser();
    REC_ANALYZER.fftSize = 256;
    source.connect(REC_ANALYZER);

    REC_METER_TIMER = setInterval(function(){
      var arr = new Uint8Array(REC_ANALYZER.frequencyBinCount);
      REC_ANALYZER.getByteFrequencyData(arr);
      var avg = arr.reduce(function(a,b){ return a+b; }, 0) / arr.length;
      var pct = Math.min(100, Math.round(avg * 1.8));
      var meter = document.getElementById("rec-meter-fill");
      if (meter) meter.style.setProperty("--level", pct + "%");
    }, 80);
  } catch (e) {}
}

function stopRecMeter() {
  if (REC_METER_TIMER) clearInterval(REC_METER_TIMER);
  REC_METER_TIMER = null;
}

async function checkNvmpOperatorSession() {

      throw new Error("HAM authentication bridge unavailable.");
    }

    var data = await window.hamAPI.getSession();
    NVMP_SESSION_LAST_CHECK = new Date().toLocaleString();

    if (data && data.discord_user && data.discord_user.display_name) {
      NVMP_OPERATOR = data.discord_user;
      return { ok: true, user: NVMP_OPERATOR, raw: data };

    return { ok: false, raw: data };
  } catch (e) {

}

function logoKey(value) {

    .toLowerCase()
    .replace(/^the\s+/, "")
    .replace(/&/g, "and")
    .replace(/[^a-z0-9]+/g, "_")
    .replace(/^_+|_+$/g, "");
}

  if (compact.indexOf("ncr") >= 0 || compact.indexOf("new california") >= 0) return "assets/factions/new_california_republic.png";

  return "";
}


function normalizeHexColor(value) {
  value = String(value || "").trim();
  if (!value) return "";
  if (/^[0-9a-f]{6}$/i.test(value)) return "#" + value;
  if (/^#[0-9a-f]{6}$/i.test(value)) return value;
  if (/^#[0-9a-f]{3}$/i.test(value)) {
    return "#" + value.charAt(1) + value.charAt(1) + value.charAt(2) + value.charAt(2) + value.charAt(3) + value.charAt(3);
  }
  return "";
}

function rgbaFromHexColor(hex, alpha) {
  hex = normalizeHexColor(hex) || "#4cff91";
  var r = parseInt(hex.slice(1, 3), 16);
  var g = parseInt(hex.slice(3, 5), 16);
  var b = parseInt(hex.slice(5, 7), 16);
  return "rgba(" + r + "," + g + "," + b + "," + alpha + ")";
}

function firstFactionColorValue(obj) {
  if (!obj) return "";
  var keys = [
    "color", "colour", "hex", "hex_color", "hexColor", "faction_color", "factionColor",
    "display_color", "displayColor", "primary_color", "primaryColor", "accent", "accentColor",
    "accent_color", "theme_color", "themeColor", "signal_color", "signalColor"
  ];
  for (var i = 0; i < keys.length; i++) {
    var c = normalizeHexColor(obj[keys[i]]);
    if (c) return c;
  }

  var nested = [obj.colors, obj.theme, obj.style, obj.branding, obj.meta, obj.raw];
  for (var n = 0; n < nested.length; n++) {
    if (nested[n] && nested[n] !== obj) {
      var nestedColor = firstFactionColorValue(nested[n]);
      if (nestedColor) return nestedColor;
    }
  }

  return "";
}

function getFactionSignalColorFallback(info) {
  var name = String((info && info.factionName) || "").toLowerCase();
  var id = String((info && info.groupId) || "");
  if (id === "1129" || name.indexOf("ham") >= 0 || name.indexOf("humans accepting mutation") >= 0) return "#4cff91";
  if (name.indexOf("ncr") >= 0 || name.indexOf("new california") >= 0 || name.indexOf("republic") >= 0) return "#ffd166";
  if (name.indexOf("legion") >= 0 || name.indexOf("caesar") >= 0) return "#ff5a4d";
  if (name.indexOf("brotherhood") >= 0 || name.indexOf("steel") >= 0) return "#45b8ff";
  if (name.indexOf("ranger") >= 0) return "#7ed957";
  if (name.indexOf("vault") >= 0 || name.indexOf("tec") >= 0) return "#f6d05f";
  if (name.indexOf("fiend") >= 0) return "#ff4ccf";
  if (name.indexOf("khans") >= 0) return "#c99a6b";
  if (name.indexOf("powder") >= 0) return "#ffb84d";
  if (name.indexOf("followers") >= 0 || name.indexOf("apocalypse") >= 0) return "#6dffb0";
  if (name.indexOf("strip") >= 0 || name.indexOf("house") >= 0 || name.indexOf("casino") >= 0) return "#f7e27f";
  if (name.indexOf("enclave") >= 0) return "#e7fff2";
  return "#4cff91";
}

function getFactionColorForInfo(info) {
  info = info || (typeof getActiveFactionInfo === "function" ? getActiveFactionInfo() : {});
  var color = firstFactionColorValue(info);
  if (color) return color;

  var group = null;
  try {
    if (info.groupId) group = getGroupById(info.groupId) || LIVE_GROUP_DETAILS[String(info.groupId)];
    if (!group && info.factionName) group = getGroupByName(info.factionName);
  } catch (e) {}
  color = firstFactionColorValue(group) || firstFactionColorValue(group && group.raw);
  if (color) return color;

  try {
    var live = getLiveFactionByName(info.factionName || "");
    color = firstFactionColorValue(live);
    if (color) return color;
  } catch (e) {}

  return getFactionSignalColorFallback(info);
}

function handleTPKeyboard(e) {
  var tpScreens = ["traitsPerks","traitsList","perksLevels","perksList","legendaryPerks","perkSearch"];
  if (tpScreens.indexOf(screen) < 0) return false;

  if (e.key === "ArrowUp") {
    selected = Math.max(0, selected - 1);
    render();
    e.preventDefault();
    return true;
  }

  if (e.key === "ArrowDown") {
    var max = 0;
    if (screen === "traitsPerks") max = 3;
    else if (screen === "traitsList") max = TRAITS_DATA.length - 1;
    else if (screen === "perksLevels") max = Array.from(new Set(PERKS_DATA.map(function(p){ return p.level; }))).length - 1;
    else if (screen === "perksList") max = PERKS_DATA.filter(function(p){ return p.level === TP_LEVEL; }).length - 1;
    else if (screen === "legendaryPerks") max = LEGENDARY_PERKS_DATA.length - 1;
    else if (screen === "perkSearch") max = TP_SEARCH_RESULTS.length - 1;

    selected = Math.min(max, selected + 1);
    render();
    e.preventDefault();
    return true;
  }

  if (e.key === "Enter") {
    if (screen === "traitsPerks") {
      var screens = ["traitsList","perksLevels","legendaryPerks","perkSearch"];
      screen = screens[selected] || "traitsList";
      selected = 0;
      render();
    } else if (screen === "traitsList") screen = "traitDetail", render();
    else if (screen === "perksLevels") {
      var levels = Array.from(new Set(PERKS_DATA.map(function(p){ return p.level; }))).sort(function(a,b){return a-b;});
      TP_LEVEL = levels[selected] || 2;
      selected = 0;
      screen = "perksList";
      render();
    } else if (screen === "perksList") screen = "perkDetail", render();
    else if (screen === "legendaryPerks") screen = "legendaryDetail", render();
    else if (screen === "perkSearch" && TP_SEARCH_RESULTS.length) screen = "searchDetail", render();

    e.preventDefault();
    return true;
  }

  return false;
}

const HAMNET_SEEN_LIMIT = 300;
let HAMNET_FEED_CACHE = [];

function readHamnetSeenIds() {
  try {
    var raw = localStorage.getItem(HAMNET_SEEN_IDS_KEY);
    if (!raw) return [];
    var parsed = JSON.parse(raw);
    return Array.isArray(parsed) ? parsed.filter(Boolean).map(String) : [];
  } catch (e) { return []; }
}

function writeHamnetSeenIds(ids) {
  try {
    var unique = [];
    var used = {};
    (ids || []).forEach(function(id) {
      id = String(id || "");
      if (!id || used[id]) return;
      used[id] = true;
      unique.push(id);
    });
    if (unique.length > HAMNET_SEEN_LIMIT) unique = unique.slice(unique.length - HAMNET_SEEN_LIMIT);
    localStorage.setItem(HAMNET_SEEN_IDS_KEY, JSON.stringify(unique));
  } catch (e) {}
}

function hamnetSeenMap() {
  var map = {};
  readHamnetSeenIds().forEach(function(id) { map[id] = true; });
  return map;
}

function writeHamnetAlertedIds(ids) {
  try {
    var unique = [];
    var used = {};
    (ids || []).forEach(function(id) {
      id = String(id || "");
      if (!id || used[id]) return;
      used[id] = true;
      unique.push(id);
    });
    if (unique.length > HAMNET_SEEN_LIMIT) unique = unique.slice(unique.length - HAMNET_SEEN_LIMIT);
    localStorage.setItem(HAMNET_ALERTED_IDS_KEY, JSON.stringify(unique));
  } catch (e) {}
}

function hamnetAlertedMap() {
  var map = {};
  readHamnetAlertedIds().forEach(function(id) { map[id] = true; });
  return map;
}

function markHamnetNotificationsAlerted(events) {
  var ids = readHamnetAlertedIds();
  (events || []).forEach(function(ev) {
    if (isHamnetBadgeEvent(ev)) ids.push(ev.id);
  });
  writeHamnetAlertedIds(ids);
}

function firstHamnetValue(obj, keys) {
  if (!obj) return "";
  for (var i = 0; i < keys.length; i++) {
    var value = obj[keys[i]];
    if (value !== undefined && value !== null && String(value).trim() !== "") return String(value).trim();
  }
  return "";
}

function hamnetTimestampValue(item) {
  var raw = firstHamnetValue(item, ["createdAt", "created_at", "timestamp", "time", "date", "ts", "updatedAt"]);
  if (!raw) return Date.now();
  if (/^\d+$/.test(raw)) {
    var n = Number(raw);
    return n < 10000000000 ? n * 1000 : n;
  }
  var parsed = Date.parse(raw);
  return isNaN(parsed) ? Date.now() : parsed;
}

function hamnetTypeLabel(type) {
  if (type === "broadcast") return "BROADCAST";
  if (type === "audio") return "AUDIO";
  if (type === "report") return "REPORT";
  return "PING";
}

function hamnetItemId(item, type) {
  var raw = firstHamnetValue(item, ["id", "uuid", "_id", "key", "createdAt", "created_at", "timestamp", "time", "date", "ts"]);
  if (!raw) {
    raw = [
      firstHamnetValue(item, ["operator", "sender", "senderName", "author", "reporter", "character", "operatorName"]),
      firstHamnetValue(item, ["location", "title", "headline", "subject"]),
      firstHamnetValue(item, ["priority", "severity", "level"]),
      firstHamnetValue(item, ["message", "report", "body", "content", "summary", "text"])
    ].join("|");
  }
  return type + ":" + String(raw || hamnetTimestampValue(item));
}

function normalizeHamnetEvent(item, type) {
  item = item || {};
  var title = firstHamnetValue(item, ["title", "headline", "subject", "location"]);
  var location = firstHamnetValue(item, ["location", "zone", "area", "site", "title"]);
  var message = firstHamnetValue(item, ["message", "report", "body", "content", "summary", "text", "description"]);
  var priority = firstHamnetValue(item, ["priority", "severity", "level", "category"]);
  var operator = firstHamnetValue(item, ["operator", "sender", "senderName", "author", "reporter", "character", "operatorName", "createdBy", "display_name"]);
  var faction = firstHamnetValue(item, ["faction", "factionName", "group", "groupName", "organization"]);
  var timestamp = hamnetTimestampValue(item);

  if (!title && type === "broadcast") title = "HAMNET BROADCAST";
  if (!title && type === "audio") title = "HAMNET AUDIO BROADCAST";
  if (!title) title = "FIELD PING";
  if (!priority) priority = type === "broadcast" ? "Broadcast" : (type === "audio" ? "Audio" : "Routine");

  return {
    id: hamnetItemId(item, type),
    type: type,
    label: hamnetTypeLabel(type),
    title: title,
    location: location,
    priority: priority,
    message: message,
    operator: operator || "Unknown Operator",
    faction: faction || "No Active Faction",
    timestamp: timestamp,
    raw: item
  };
}

function extractHamnetEvents(data, type, key) {
  var rows = [];
  if (!data) return rows;
  if (Array.isArray(data)) rows = data;
  else if (Array.isArray(data[key])) rows = data[key];
  else if (Array.isArray(data.items)) rows = data.items;
  else if (Array.isArray(data.results)) rows = data.results;
  else if (Array.isArray(data.data)) rows = data.data;
  else if (type === "ping" && Array.isArray(data.reports)) rows = data.reports;
  return rows.map(function(item) { return normalizeHamnetEvent(item, type); });
}

function mergeHamnetEvents(events) {
  var byId = {};
  (HAMNET_FEED_CACHE || []).concat(events || []).forEach(function(ev) {
    if (!ev || !ev.id) return;
    if (!byId[ev.id] || ev.timestamp > byId[ev.id].timestamp) byId[ev.id] = ev;
  });
  return Object.keys(byId).map(function(id) { return byId[id]; })
    .sort(function(a, b) { return b.timestamp - a.timestamp; })
    .slice(0, 80);
}

function normalizeHamnetOperatorName(value) {
  return String(value || "").toLowerCase().replace(/[^a-z0-9]+/g, " ").replace(/\s+/g, " ").trim();
}

function getHamnetOperatorAliases() {
  var names = [];
  try {
    if (typeof getPingOperatorInfo === "function") names.push(getPingOperatorInfo().name);
    if (typeof getAudioOperatorInfo === "function") names.push(getAudioOperatorInfo().operator);
    if (typeof getActiveFactionInfo === "function") names.push(getActiveFactionInfo().operatorName);
    if (typeof NVMP_CHARACTER !== "undefined" && NVMP_CHARACTER) names.push(NVMP_CHARACTER.name);
    if (typeof NVMP_OPERATOR !== "undefined" && NVMP_OPERATOR) {
      names.push(NVMP_OPERATOR.display_name);
      names.push(NVMP_OPERATOR.username);
      names.push(NVMP_OPERATOR.global_name);
    }
  } catch (e) {}
  var aliases = {};
  names.forEach(function(name) {
    var n = normalizeHamnetOperatorName(name);
    if (n && n !== "unknown operator" && n !== "unverified") aliases[n] = true;
  });
  return aliases;
}

function isOwnHamnetEvent(ev) {
  var aliases = getHamnetOperatorAliases();
  var sender = normalizeHamnetOperatorName(ev && ev.operator);
  return !!(sender && aliases[sender]);
}

function isHamnetBadgeEvent(ev) {
  return ev && (ev.type === "ping" || ev.type === "broadcast" || ev.type === "report" || ev.type === "audio");
}

function getUnseenHamnetEvents() {
  var seen = hamnetSeenMap();
  return (HAMNET_FEED_CACHE || []).filter(function(ev) {
    return isHamnetBadgeEvent(ev) && !seen[ev.id];
  });
}

function getHamnetUnseenCount() {
  return getUnseenHamnetEvents().length;
}

function markHamnetNotificationsSeen(events) {
  var ids = readHamnetSeenIds();
  (events || HAMNET_FEED_CACHE || []).forEach(function(ev) {
    if (isHamnetBadgeEvent(ev)) ids.push(ev.id);
  });
  writeHamnetSeenIds(ids);
}

async function fetchHamnetJson(path) {
  var joiner = path.indexOf("?") >= 0 ? "&" : "?";
  var res = await fetch(NVMP_LIVE_PINGS_ENDPOINT + path.replace(/^\//, "") + joiner + "t=" + Date.now(), { cache: "no-store" });
  var data = await res.json().catch(function() { return { ok:false, error:"Bad HAMNET response" }; });
  if (!res.ok || data.ok === false) throw new Error(data.error || ("HAMNET returned " + res.status));
  return data;
}

async function fetchHamnetNotifications(force) {
  var now = Date.now();
  if (!force && now - HAMNET_NOTIFY_LAST_FETCH < 10000) return HAMNET_FEED_CACHE;
  HAMNET_NOTIFY_LAST_FETCH = now;

  var firstLocalRun = localStorage.getItem(HAMNET_SEEN_IDS_KEY) === null;
  var specs = [
    { path:"pings", type:"ping", key:"pings" },
    { path:"broadcasts", type:"broadcast", key:"broadcasts" },
    { path:"audio", type:"audio", key:"audio" },
    { path:"status", type:"status", key:"status" }
  ];

  var results = await Promise.allSettled(specs.map(function(spec) {
    return fetchHamnetJson(spec.path).then(function(data) { return { spec: spec, data: data }; });
  }));

  var okCount = 0;
  var freshEvents = [];
  results.forEach(function(result) {
    if (result.status !== "fulfilled") return;
    okCount++;
    var spec = result.value.spec;
    var data = result.value.data;
    if (spec.type === "status") {
      freshEvents = freshEvents
        .concat(extractHamnetEvents(data, "ping", "pings"))
        .concat(extractHamnetEvents(data, "ping", "reports"))
        .concat(extractHamnetEvents(data, "broadcast", "broadcasts"))
        .concat(extractHamnetEvents(data, "audio", "audio"));
    } else {
      freshEvents = freshEvents.concat(extractHamnetEvents(data, spec.type, spec.key));
    }
  });

  HAMNET_NOTIFY_NETWORK_DEGRADED = okCount === 0;
  HAMNET_FEED_CACHE = mergeHamnetEvents(freshEvents);

  if (firstLocalRun) {
    markHamnetNotificationsSeen(HAMNET_FEED_CACHE);
    return HAMNET_FEED_CACHE;
  }

  var unseen = getUnseenHamnetEvents();
  var ownEvents = unseen.filter(isOwnHamnetEvent);
  if (ownEvents.length) markHamnetNotificationsSeen(ownEvents);

  unseen = getUnseenHamnetEvents().filter(function(ev) { return !isOwnHamnetEvent(ev); });
  if (screen === "livePings" || screen === "hamnetAudio") {
    markHamnetNotificationsSeen(HAMNET_FEED_CACHE);
  } else if (unseen.length) {
    var alerted = hamnetAlertedMap();
    var freshAlerts = unseen.filter(function(ev) { return !alerted[ev.id]; });
    if (freshAlerts.length) {
      showHamnetFeedAlert(freshAlerts[0], unseen.length);
      markHamnetNotificationsAlerted(freshAlerts);
    }
  }

  return HAMNET_FEED_CACHE;
}

function renderHamnetMenuAlert(parent) {
  var info = (typeof getActiveFactionInfo === "function") ? getActiveFactionInfo() : {};
  var factionColor = getFactionColorForInfo(info);
  var factionGlow = rgbaFromHexColor(factionColor, 0.42);
  var unseen = getUnseenHamnetEvents();
  var count = unseen.length;
  var latest = unseen[0] || (HAMNET_FEED_CACHE && HAMNET_FEED_CACHE[0]) || null;

  var banner = document.createElement("div");
  banner.className = "hamnet-alert-banner" + (count ? "" : " standby");
  banner.setAttribute("tabindex", "0");
  banner.style.setProperty("--hamnet-faction-color", factionColor);
  banner.style.setProperty("--hamnet-faction-glow", factionGlow);

  if (count > 0 && latest) {
    banner.innerHTML =
      '<div class="hamnet-alert-title">HAMNET ALERT // ' + count + ' NEW</div>' +
      '<div class="hamnet-alert-meta">' + escapeHtml(latest.location || latest.title || "UNKNOWN") + ' // ' + escapeHtml(latest.priority || latest.label) + '</div>' +
      '<div class="hamnet-alert-message">' + escapeHtml(latest.operator || "Unknown") + ': ' + escapeHtml(latest.message || latest.title || "Incoming field report.") + '</div>' +
      '<div class="hamnet-alert-open">' + (latest.type === "audio" ? '[OPEN RADIO]' : '[OPEN LIVE PINGS]') + '</div>';
  } else {
    var status = HAMNET_NOTIFY_NETWORK_DEGRADED ? "NETWORK DEGRADED" : "STANDBY";
    var feedCount = (HAMNET_FEED_CACHE || []).length;
    banner.innerHTML =
      '<div class="hamnet-alert-title">HAMNET NOTIFICATIONS // ' + status + '</div>' +
      '<div class="hamnet-alert-meta">' + escapeHtml(info.factionName || "NO FACTION") + ' SIGNAL COLOR // ' + feedCount + ' CACHED</div>' +
      '<div class="hamnet-alert-message">No new field pings. Live Pings remains armed in the background.</div>' +
      '<div class="hamnet-alert-open">[OPEN LIVE PINGS]</div>';
  }

  banner.addEventListener("click", function() {
    if (latest && latest.type === "audio") openRotjawsRadioFromHamnetAlert();
    else openLivePingsFromHamnetAlert();
  });
  banner.addEventListener("keydown", function(e) {
    if (e.key === "Enter" || e.key === " ") {
      if (latest && latest.type === "audio") openRotjawsRadioFromHamnetAlert();
      else openLivePingsFromHamnetAlert();
      e.preventDefault();
    }
  });
  parent.appendChild(banner);

  if (HAMNET_NOTIFY_NETWORK_DEGRADED) {
    var degraded = document.createElement("div");
    degraded.className = "hamnet-network-degraded";
    degraded.style.setProperty("--hamnet-faction-color", factionColor);
    degraded.style.setProperty("--hamnet-faction-glow", factionGlow);
    degraded.textContent = "HAMNET NETWORK DEGRADED";
    parent.appendChild(degraded);
  }
}

function startHamnetNotificationPolling() {
  if (window.__hamnetNotificationPoller) return;
  window.__hamnetNotificationPoller = setInterval(function() {
    fetchHamnetNotifications(true).then(function() {
      if (screen === "menu" || screen === "livePings") render();
    }).catch(function() { HAMNET_NOTIFY_NETWORK_DEGRADED = true; });
  }, HAMNET_NOTIFY_POLL_MS);

  fetchHamnetNotifications(true).then(function() {
    if (screen === "menu" || screen === "livePings") render();
  }).catch(function() { HAMNET_NOTIFY_NETWORK_DEGRADED = true; });
}

function escapeHtml(s) {
  return String(s || "").replace(/[&<>"']/g, function(c) {
    return ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" })[c];
  });
}

function getPingOperatorInfo() {
  var active = (typeof getActiveFactionInfo === "function") ? getActiveFactionInfo() : {};
  var char = (typeof NVMP_CHARACTER !== "undefined" && NVMP_CHARACTER) ? NVMP_CHARACTER : {};
  return {
    name: active.operatorName || char.name || "Unknown Operator",
    rank: active.rank || "Unlisted",
    faction: active.factionName || "No Active Faction",
    sparks: char.points_wallet !== undefined ? char.points_wallet : "Unknown"
  };
}

async function sendDiscordLivePing(payload) {
  var operator = getPingOperatorInfo();
  var res = await fetch(NVMP_LIVE_PINGS_ENDPOINT, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      type: "ping",
      operator: operator.name,
      rank: operator.rank,
      faction: operator.faction,
      sparks: operator.sparks,
      location: payload.location || "Unknown",
      priority: payload.priority || "Routine",
      message: payload.message || "No report supplied."
    })
  });

  var data = await res.json().catch(function(){ return { ok: false, error: "Bad relay response" }; });
  if (!res.ok || !data.ok) throw new Error(data.error || ("Relay returned " + res.status));
  return true;
}

function renderLivePings() {
  var seenBeforeOpen = hamnetSeenMap();
  var body = frame("LIVE PINGS", "HAMNET FIELD REPORT RELAY", "SEND REPORT - OPENING THIS MODULE MARKS ALERTS SEEN - ESC BACK");
  var wrap = document.createElement("div");
  wrap.className = "ping-wrap";
  var operator = getPingOperatorInfo();

  var recent = (HAMNET_FEED_CACHE || []).slice(0, 18);
  var feedHtml = '<div class="ping-card"><div class="ping-feed-title">LATEST HAMNET TRAFFIC</div>';
  feedHtml += HAMNET_NOTIFY_NETWORK_DEGRADED
    ? '<div class="hamnet-network-degraded">NETWORK DEGRADED // LAST KNOWN TRAFFIC SHOWN</div>'
    : '<div class="ping-feed-status">NETWORK LINK NOMINAL // POLLING EVERY 15 SECONDS</div>';

  if (!recent.length) {
    feedHtml += '<div class="tp-sub">No HAMNET pings, broadcasts, or audio reports cached yet.</div>';
  } else {
    recent.forEach(function(ev) {
      var unseenClass = isHamnetBadgeEvent(ev) && !seenBeforeOpen[ev.id] ? ' unseen' : '';
      var when = ev.timestamp ? new Date(ev.timestamp).toLocaleString() : 'UNKNOWN TIME';
      feedHtml += '<div class="ping-feed-item' + unseenClass + '">' +
        '<div class="ping-feed-head">' + escapeHtml(ev.label) + ' // ' + escapeHtml(ev.location || ev.title || 'UNKNOWN') + ' // ' + escapeHtml(ev.priority || 'Routine') + '</div>' +
        '<div class="ping-feed-meta">' + escapeHtml(ev.operator || 'Unknown') + ' // ' + escapeHtml(ev.faction || 'No Active Faction') + ' // ' + escapeHtml(when) + '</div>' +
        '<div class="ping-feed-msg">' + escapeHtml(ev.message || ev.title || 'Incoming HAMNET signal.') + '</div>' +
      '</div>';
    });
  }
  feedHtml += '</div>';

  wrap.innerHTML =
    '<div class="ping-card"><div class="tp-title">OPERATOR AUTO-FILL</div>' +
    '<div class="tp-sub">Operator: <span class="spark-blue">' + escapeHtml(operator.name) + '</span> // Rank: <span class="spark-blue">' + escapeHtml(operator.rank) + '</span> // Faction: <span class="spark-blue">' + escapeHtml(operator.faction) + '</span></div></div>' +
    '<div class="ping-card"><div class="tp-title">SEND LIVE PING</div>' +
    '<div class="tp-label">LOCATION</div><input id="pingLocation" class="ping-input" placeholder="Example: Black Mountain, Freeside, Primm">' +
    '<div class="tp-label">PRIORITY</div><select id="pingPriority" class="ping-select"><option>Routine</option><option>Important</option><option>Emergency</option><option>Broadcast</option><option>News</option></select>' +
    '<div class="tp-label">REPORT</div><textarea id="pingMessage" class="ping-textarea" placeholder="Type the live report here..."></textarea>' +
    '<button id="sendPingBtn" class="job-location-btn">SEND LIVE PING</button>' +
    '<div id="pingStatus" class="ping-send-status">Relay online.</div></div>' +
    feedHtml;

  body.appendChild(wrap);
  markHamnetNotificationsSeen(HAMNET_FEED_CACHE);

  if (Date.now() - HAMNET_LIVE_PINGS_LAST_RENDER_FETCH > 12000) {
    HAMNET_LIVE_PINGS_LAST_RENDER_FETCH = Date.now();
    fetchHamnetNotifications(true).then(function() {
      markHamnetNotificationsSeen(HAMNET_FEED_CACHE);
      if (screen === "livePings") render();
    }).catch(function() { HAMNET_NOTIFY_NETWORK_DEGRADED = true; });
  }

  var sendBtn = wrap.querySelector("#sendPingBtn");
  var status = wrap.querySelector("#pingStatus");

  if (sendBtn) {
    sendBtn.addEventListener("click", async function() {
      try {
        status.style.color = "";
        status.textContent = "Transmitting live ping...";
        await sendDiscordLivePing({
          location: wrap.querySelector("#pingLocation").value,
          priority: wrap.querySelector("#pingPriority").value,
          message: wrap.querySelector("#pingMessage").value
        });
        status.textContent = "PING SENT TO HAMNET.";
        wrap.querySelector("#pingMessage").value = "";
        await fetchHamnetNotifications(true);
        render();
      } catch (err) {
        var isLimit = err.message && err.message.indexOf("limit") !== -1;
        status.style.color = isLimit ? "#ffb84d" : "#ff4c4c";
        status.textContent = (isLimit ? "RATE LIMITED: " : "PING FAILED: ") + err.message;
      }
    });
  }

  addBtn("REFRESH", function(){ fetchHamnetNotifications(true).then(function(){ markHamnetNotificationsSeen(HAMNET_FEED_CACHE); render(); }); }, true);
  addBtn("BACK", goBack);
}

function getActiveFactionInfo() {
  var info = {
    hasFaction: false,
    groupId: null,
    factionName: "",
    operatorName: "UNVERIFIED",
    rank: "",
    leader: "",
    logo: "",
    color: ""
  };

  if (typeof NVMP_CHARACTER !== "undefined" && NVMP_CHARACTER) {
    info.operatorName = NVMP_CHARACTER.name || info.operatorName;
    info.groupId = NVMP_CHARACTER.primary_group_id || null;

    var group = info.groupId ? getGroupById(info.groupId) : null;
    if (String(info.groupId) === "1129") info.factionName = "HAM";
    else if (group && group.name) info.factionName = group.name;
    else if (info.groupId) info.factionName = "GROUP " + info.groupId;

    info.hasFaction = !!info.groupId;
    info.rank = getOperatorPrimaryRole() || "Member";
    info.leader = group && group.leader ? group.leader : (String(info.groupId) === "1129" ? "Rotjaw" : "");
    info.logo = getFactionLogo(info.groupId, info.factionName);
    info.color = getFactionColorForInfo(info);
  }

  if (!info.hasFaction && typeof NVMP_OPERATOR !== "undefined" && NVMP_OPERATOR && NVMP_OPERATOR.display_name) {
    info.operatorName = NVMP_OPERATOR.display_name;
  }

  if (!info.color) info.color = getFactionColorForInfo(info);
  return info;
}

function factionPackageLine(name, id) {
  var key = logoKey(name);
  if (String(id) === "1129" || key.indexOf("ham") >= 0) return "BROADCAST PACKAGE LOADED";
  if (String(id) === "1126" || key.indexOf("80") >= 0) return "INTERSTATE NETWORK LOADED";
  if (key.indexOf("new_california") >= 0 || key === "ncr") return "REPUBLIC PERSONNEL REGISTRY LOADED";
  if (key.indexOf("legion") >= 0) return "LEGION CENSUS VERIFIED";
  if (key.indexOf("brotherhood") >= 0) return "CODEX ACCESS GRANTED";
  if (key.indexOf("ranger") >= 0) return "RECON NETWORK ONLINE";
  if (key.indexOf("talon") >= 0) return "COMPANY MANIFEST LOADED";
  if (key.indexOf("fiend") >= 0) return "CHEM TRAIL SIGNAL ACQUIRED";
  return "FACTION PACKAGE LOADED";
}

function cleanApiDescription(text) {
  text = String(text || "").trim();
  if (!text) return "";
  if (text === "null" || text === "undefined") return "";
  return text;
}

function getBestGroupDescription(record, live, intel) {
  live = live || {};
  var group = getGroupForFaction(record && record.name, live);
  var detail = getGroupDetailForRecord(record || {});
  var groupDesc = "";

  if (detail) {
    groupDesc = cleanApiDescription(detail.description) ||
      cleanApiDescription(detail.public_description) ||
      cleanApiDescription(detail.publicDescription) ||
      cleanApiDescription(detail.about) ||
      cleanApiDescription(detail.summary) ||
      cleanApiDescription(detail.bio);
  }

  if (!groupDesc && group) {
    groupDesc = cleanApiDescription(group.description) ||
      (group.raw ? cleanApiDescription(group.raw.description) : "") ||
      (group.raw ? cleanApiDescription(group.raw.public_description) : "") ||
      (group.raw ? cleanApiDescription(group.raw.about) : "") ||
      (group.raw ? cleanApiDescription(group.raw.summary) : "");
  }

  if (!groupDesc && live) {
    groupDesc = cleanApiDescription(live.apiDescription) ||
      cleanApiDescription(live.description) ||
      (live.raw ? cleanApiDescription(live.raw.description) : "") ||
      (live.raw ? cleanApiDescription(live.raw.about) : "") ||
      (live.raw ? cleanApiDescription(live.raw.summary) : "");
  }

  if (!groupDesc && record) {
    groupDesc = cleanApiDescription(record.apiDescription) || cleanApiDescription(record.description);
  }

  if (!groupDesc && isHamFactionRecord(record && record.name, live)) {
    groupDesc = (intel && intel.hamNote) || "HAM archive entry online.";
  }

  return groupDesc;
}

function hexToFrameRgba(hex, alpha) {
  hex = String(hex || "#4cff91").replace("#", "");
  if (hex.length === 3) hex = hex.split("").map(function(ch) { return ch + ch; }).join("");
  var n = parseInt(hex, 16);
  if (!isFinite(n)) return "rgba(76,255,145," + alpha + ")";
  return "rgba(" + ((n >> 16) & 255) + "," + ((n >> 8) & 255) + "," + (n & 255) + "," + alpha + ")";
}

function getTerminalFrameColorValue() {
  var id = getTerminalFrameColor();
  if (id === "sync") {
    var active = TERMINAL_THEMES.find(function(t) { return t.id === getTerminalTheme(); }) || TERMINAL_THEMES[0];
    return active.color || "#4cff91";
  }
  var picked = TERMINAL_FRAME_COLORS.find(function(t) { return t.id === id; });
  return (picked && picked.color) || "#4cff91";
}

function applyTerminalFrameColor() {
  var color = getTerminalFrameColorValue();
  document.body.style.setProperty("--frame-accent", color);
  document.body.style.setProperty("--frame-glow", hexToFrameRgba(color, 0.46));
  document.body.setAttribute("data-frame-color", getTerminalFrameColor());
}

  var valid = TERMINAL_FRAME_COLORS.some(function(t) { return t.id === id; });

}

function applyTerminalTheme() {
  var id = getTerminalTheme();
  var validTheme = TERMINAL_THEMES.some(function(t) { return t.id === id; });

  Array.from(document.body.classList).forEach(function(cls) {

  document.body.classList.add("theme-" + id);
  document.body.setAttribute("data-terminal-theme", id);
  applyTerminalFrameColor();
}
