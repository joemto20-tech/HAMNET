        color: faction.color || "#4cff91",
        hqName: faction.hq || "",
        name: loc.name,
        safe: !!loc.safe,
        locked: !!loc.locked,
        x: Number(loc.x || 0),
        y: Number(loc.y || 0),
        isHq: faction.hq && loc.name === faction.hq
      });
    });
  });

  return rows;
}

function mapScale(value, min, max, outMin, outMax) {
  if (max === min) return (outMin + outMax) / 2;
  return outMin + ((value - min) / (max - min)) * (outMax - outMin);
}


const NVMP_MAP_PINGS_ENDPOINT = "https://nvmp-live-pings.joemto20.workers.dev/pings";
let MAP_PINGS_CACHE = [];
let MAP_PINGS_LAST_FETCH = 0;

async function fetchMapPings(force) {
  var now = Date.now();
  if (!force && now - MAP_PINGS_LAST_FETCH < 12000) return MAP_PINGS_CACHE;
  MAP_PINGS_LAST_FETCH = now;

  try {
    var res = await fetch(NVMP_MAP_PINGS_ENDPOINT + "?t=" + now, { cache: "no-store" });
    if (!res.ok) throw new Error("Map ping relay returned " + res.status);
    var data = await res.json();
    MAP_PINGS_CACHE = Array.isArray(data.pings) ? data.pings : [];
  } catch(e) {
    console.warn("Map ping fetch failed", e);
  }

  return MAP_PINGS_CACHE;
}

function addMapPingOverlay(body) {
  if (!body) return;

  if (MAP_PINGS_CACHE && MAP_PINGS_CACHE.length) {
    var banner = document.createElement("div");
    banner.className = "map-ping-banner";
    banner.textContent = "LIVE MAP PINGS // " + MAP_PINGS_CACHE.length + " ACTIVE";
    body.appendChild(banner);
  }

  (MAP_PINGS_CACHE || []).forEach(function(p) {
    var x = Number(p.x || 50);
    var y = Number(p.y || 50);

    var marker = document.createElement("div");
    marker.className = "map-ping-marker";
    marker.style.left = x + "%";
    marker.style.top = y + "%";
    marker.textContent = p.priority === "Emergency" ? "◆" : "◇";
    body.style.position = "relative";
    body.appendChild(marker);

    var label = document.createElement("div");
    label.className = "map-ping-label";
    label.style.left = x + "%";
    label.style.top = y + "%";
    label.innerHTML =
      String(p.location || "UNKNOWN").toUpperCase() +
      "<br>" +
      String(p.message || "").slice(0, 80);
    body.appendChild(label);
  });
}

function startMapPingPolling() {
  if (window.__nvmpMapPingPoller) return;
  window.__nvmpMapPingPoller = setInterval(function() {

  fetchMapPings(true);
}

function renderText(title, lines) {
  var allLines = [];
  lines.forEach(function(l){ allLines.push(l); allLines.push(''); });
  var VISIBLE=13;
  var start=Math.min(scroll,Math.max(0,allLines.length-VISIBLE));
  var body = frame(title,'','\u2191\u2193 SCROLL \u2022 ESC / BACK TO RETURN');
  var el = document.createElement('div'); el.className='text-body';
  for (var i=start;i<Math.min(allLines.length,start+VISIBLE);i++) {
    var p=document.createElement('p'); p.textContent=allLines[i]||'\u00a0'; el.appendChild(p);
  }
  body.appendChild(el);
  addBtn('\u25b2 UP', function(){ scroll=Math.max(0,scroll-1); render(); });
  addBtn('\u25bc DOWN', function(){ scroll++; render(); });
  addBtn('\u25c4 BACK', goBack);
}

function influenceLabel(count) {
  if (count >= 50) return "DOMINANT";
  if (count >= 25) return "MAJOR";
  if (count >= 10) return "REGIONAL";
  if (count >= 3) return "LOCAL";
  return "MINIMAL";
}

function influencePercent(count) {
  return Math.max(6, Math.min(100, Math.round((count / 65) * 100)));
}

function getCharName(member) {
  if (!member) return "";
  if (member.character && member.character.name) return member.character.name;
  return member.name || member.character_name || member.display_name || member.username || "";
}

function getMemberRoleText(member) {
  if (!member) return "";
  if (member.custom_role_text) return member.custom_role_text;
  if (Number(member.role) === 3) return "Leader";
  if (Number(member.role) === 2) return "Officer";
  if (Number(member.role) === 1) return "Member";
  return "Member";
}

function relationshipBuckets(group) {
  var out = { Ally: [], Neutral: [], Enemy: [], Other: [] };
  var rows = [];
  if (group && Array.isArray(group.relationships_towards)) rows = rows.concat(group.relationships_towards);
  rows.forEach(function(r) {
    var rel = String(r.relationship || "Other");
    var name = r.group_name || r.name || "UNKNOWN";
    if (!out[rel]) out[rel] = [];
    out[rel].push(name);
  });
  return out;
}

function shortText(s, n) {
  s = String(s || "");
  if (s.length <= n) return s;
  return s.slice(0, n - 3) + "...";
}

function getGroupDetailForRecord(record) {
  var live = record && record.live;
  var group = getGroupForFaction(record && record.name, live);
  if (group) {
    if (group.raw) {
      var raw = Object.assign({}, group.raw);
      raw.id = raw.id || group.id;
      raw.name = raw.name || group.name;
      raw.description = raw.description || group.description;
      raw.num_members = raw.num_members || group.num_members;
      raw.num_zones_owned = raw.num_zones_owned || group.num_zones_owned;
      raw.leaders = raw.leaders || group.leaders || [];
      raw.officers = raw.officers || group.officers || [];
      raw.members = raw.members || group.members || [];
      raw.relationships_towards = raw.relationships_towards || group.relationships_towards || [];
      raw.relationships_incoming = raw.relationships_incoming || group.relationships_incoming || [];
      return raw;
    }

    return {
      id: group.id,
      name: group.name,
      description: group.description,
      num_members: group.num_members,
      num_zones_owned: group.num_zones_owned,
      leaders: group.leaders || [],
      officers: group.officers || [],
      members: group.members || [],
      relationships_towards: group.relationships_towards || [],
      relationships_incoming: group.relationships_incoming || []
    };
  }
  return {};
}

    rows.slice(0, 12).forEach(function(x){ html += '<div class="db2-rel-item">• ' + x + '</div>'; });
    if (rows.length > 12) html += '<div class="db2-rel-item">+' + (rows.length - 12) + ' more</div>';
    html += '</div>';
  });
  html += '</div>';

  html += '<div class="db2-section">OFFICERS</div>';
  html += '<div class="db2-roster">';
  if (!officers.length) html += '<div class="db2-person"><div class="db2-person-name">No officers listed.</div></div>';
  officers.slice(0, 12).forEach(function(m) {
    html += '<div class="db2-person"><div class="db2-person-name">' + getCharName(m) + '</div><div class="db2-person-role">' + getMemberRoleText(m) + '</div></div>';
  });
  html += '</div>';

  html += '<div class="db2-section">MEMBERS</div>';
  html += '<div class="db2-roster">';
  if (!members.length) html += '<div class="db2-person"><div class="db2-person-name">No members listed.</div></div>';
  members.slice(0, 24).forEach(function(m) {
    html += '<div class="db2-person"><div class="db2-person-name">' + getCharName(m) + '</div><div class="db2-person-role">' + getMemberRoleText(m) + '</div></div>';
  });
  if (members.length > 24) html += '<div class="db2-person"><div class="db2-person-name">+' + (members.length - 24) + ' more members</div></div>';
  html += '</div>';

  wrap.innerHTML = html;
  body.appendChild(wrap);

  wrap.querySelectorAll('[data-action="set-disposition"]').forEach(function(btn) {
    btn.addEventListener('click', function() {
      setUserDisposition(record.name, btn.dataset.value);
      if (typeof playSound === "function") playSound("click", 0.7);
      render();
    });
  });

  var editBtn = wrap.querySelector('[data-action="edit-note"]');
  if (editBtn) {
    editBtn.addEventListener('click', function() {
      var display = wrap.querySelector('#factionNoteDisplay');
      var editor = wrap.querySelector('#factionNoteEditor');
      if (display) display.style.display = 'none';
      if (editor) { editor.style.display = 'block'; editor.querySelector('#factionNoteText').focus(); }
    });
  }

  var saveBtn = wrap.querySelector('[data-action="save-note"]');
  if (saveBtn) {
    saveBtn.addEventListener('click', function() {
      var text = wrap.querySelector('#factionNoteText').value;
      setCustomFactionNote(record.name, text);
      render();
    });
  }

  var clearBtn = wrap.querySelector('[data-action="clear-note"]');
  if (clearBtn) {
    clearBtn.addEventListener('click', function() {
      setCustomFactionNote(record.name, '');
      render();
    });
  }

  var cancelBtn = wrap.querySelector('[data-action="cancel-note"]');
  if (cancelBtn) {
    cancelBtn.addEventListener('click', function() {
      var display = wrap.querySelector('#factionNoteDisplay');
      var editor = wrap.querySelector('#factionNoteEditor');
      if (display) display.style.display = '';
      if (editor) editor.style.display = 'none';
    });
  }

  var pipBody = body;
  addBtn("▲ UP", function(){ pipBody.scrollTop = Math.max(0, pipBody.scrollTop - 80); });
  addBtn("▼ DOWN", function(){ pipBody.scrollTop = pipBody.scrollTop + 80; });

function renderNote() {

function closeHamTerminalApp() {
  try { if (typeof stopHamnetRadio === "function") stopHamnetRadio(); } catch(e) {}

  selected = 0;

function framePowerHoldAction() {

function toggleTerminalAudioFromFrame() {

    if (HAM_AUDIO.ambient) HAM_AUDIO.ambient.pause();
    HAM_AUDIO.ambient = null;
    HAM_AUDIO.currentAmbient = "";

function openMenu(idx) {

function listMax() {
  if (screen==='radd') return (LIVE_RADD || DATA.raddSummary).length;
  if (screen==='factions') return getAllDatabaseFactions().length;
  if (screen==='holotapes') return getHolotapeItems().length;
  if (screen==='notes') return state.notes.length+1;
  return 0;
}

function openListItem() {
  if (screen==='radd') { screen='raddOwner'; scroll=0; render(); }
  else if (screen==='factions') { screen='faction'; scroll=0; render(); }
  else if (screen==='holotapes') {
    var tapeItem = getHolotapeItems()[selected];
    if (tapeItem && tapeItem.recorder) screen = 'recorder';
    else if (tapeItem && tapeItem.game) screen = 'holotapeGame';
    else screen = 'tape';
    scroll = 0;
    render();
  }
  else if (screen==='notes') {
    if (selected>=state.notes.length) { state.notes.push("NEW FIELD NOTE"); selected=state.notes.length-1; }
    screen='note'; render();
  }
}

function goBack() {
  if (screen === 'map' && RETURN_SCREEN === "jobs") { screen = 'jobs'; RETURN_SCREEN = null; render(); return; }
  audioBackClick();
  scroll=0; selected=0;
  if (screen==='faction') screen='factions';
  else if (screen==='raddOwner') screen='radd';
  else if (screen==='tape') screen='holotapes';
  else if (screen==='holotapeGame') screen='holotapes';
  else if (screen==='recorder') screen='holotapes';
  else if (screen==='traitsPerks') screen='menu';
  else if (screen==='traitsList' || screen==='perksLevels' || screen==='legendaryPerks' || screen==='perkSearch') screen='traitsPerks';
  else if (screen==='perksList') screen='perksLevels';
  else if (screen==='traitDetail') screen='traitsList';
  else if (screen==='perkDetail') screen='perksList';
  else if (screen==='legendaryDetail') screen='legendaryPerks';
  else if (screen==='searchDetail') screen='perkSearch';
  else if (screen==='jobs') screen='menu';
  else if (screen==='livePings') screen='menu';
  else if (screen==='terminalSettings') screen='menu';
  else if (screen==='submissions') screen='menu';
  else if (screen==='hamLock') screen='menu';
  else if (screen==='hamModules') screen='menu';
  else if (screen==='hamnetAudio') screen='menu';
  else if (screen==='hamStation') { if (typeof stopListeningStation === 'function') stopListeningStation(true); screen='hamModules'; }
  else if (screen==='note') screen='notes';
  else screen='menu';
  render();
}

document.getElementById('terminal').addEventListener('keydown', function(e) {
  var activeEl = document.activeElement;
  var isEditingText = activeEl && (
    activeEl.tagName === 'TEXTAREA' ||
    activeEl.tagName === 'INPUT' ||
    activeEl.tagName === 'SELECT' ||
    activeEl.isContentEditable
  );
  if (isEditingText) {
    if (e.key === 'Escape') {
      activeEl.blur();
      goBack();
      e.preventDefault();
    }
    return;
  }
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Enter','Escape','Backspace','+','-','=','_','0'].indexOf(e.key)>=0) { audioNavClick(); }
  if (screen==='lock') {
    if (e.key==='Enter' || e.key===' ') {
      powerOnTerminal();
      e.preventDefault();
    }
    return;
  } else if (screen==='menu') {
    if (e.key==='ArrowLeft'||e.key==='ArrowUp'){ menuIdx=(menuIdx+MENUS.length-1)%MENUS.length; render(); e.preventDefault(); }
    else if (e.key==='ArrowRight'||e.key==='ArrowDown'){ menuIdx=(menuIdx+1)%MENUS.length; render(); e.preventDefault(); }
    else if (e.key==='Enter'){ openMenu(menuIdx); e.preventDefault(); }
  } else if (screen==='radd'||screen==='factions'||screen==='holotapes'||screen==='notes') {
    var max=listMax();
    if (e.key==='ArrowUp'){ selected=Math.max(0,selected-1); render(); e.preventDefault(); }
    else if (e.key==='ArrowDown'){ selected=Math.min(max-1,selected+1); render(); e.preventDefault(); }
    else if (e.key==='Enter'){ openListItem(); e.preventDefault(); }
    else if (e.key==='Escape'){ goBack(); e.preventDefault(); }
        } else if (screen==='map') {
    var mapLocations = getMapRenderLocations();
    if (e.key==='ArrowUp'){ selected=Math.max(0,selected-1); render(); e.preventDefault(); }
    else if (e.key==='ArrowDown'){ selected=Math.min(Math.max(0,mapLocations.length-1),selected+1); render(); e.preventDefault(); }
    else if (e.key==='+' || e.key==='='){ MAP_ZOOM=Math.min(3,Math.round((MAP_ZOOM+0.25)*100)/100); render(); e.preventDefault(); }
    else if (e.key==='-' || e.key==='_'){ MAP_ZOOM=Math.max(1,Math.round((MAP_ZOOM-0.25)*100)/100); if (MAP_ZOOM <= 1) resetMapPan(); render(); e.preventDefault(); }
    else if (e.key==='0'){ MAP_ZOOM=1; resetMapPan(); render(); e.preventDefault(); }
    else if (e.key==='Enter'){
      var current = mapLocations[selected];
      var ownerIndex = (LIVE_RADD || []).findIndex(function(f){ return current && f.owner === (current.owner || current.faction); });
      if (ownerIndex >= 0) { selected = ownerIndex; screen = 'raddOwner'; scroll = 0; render(); }
      e.preventDefault();
    }
    else if (e.key==='Escape'){ goBack(); e.preventDefault(); }
  } else if (screen==='checklist') {
    if (e.key==='ArrowUp'){ selected=Math.max(0,selected-1); render(); e.preventDefault(); }
    else if (e.key==='ArrowDown'){ selected=Math.min(DATA.checklist.length-1,selected+1); render(); e.preventDefault(); }
    else if (e.key==='Enter'||e.key===' '){ state.done[selected]=!state.done[selected]; render(); e.preventDefault(); }
    else if (e.key==='Escape'){ goBack(); e.preventDefault(); }
  } else {
    if (e.key==='ArrowUp'){ scroll=Math.max(0,scroll-1); render(); e.preventDefault(); }
    else if (e.key==='ArrowDown'){ scroll++; render(); e.preventDefault(); }
    else if (e.key==='Escape'||e.key==='Backspace'){ goBack(); e.preventDefault(); }
  }
});


/* HAM OS 4.2 MOUSE WHEEL / TRACKPAD SCROLL
   Native scroll handles all containers with overflow-y:auto.
   This handler only steps the keyboard-nav list/text screens. */

function getScrollableTerminalElement(start) {
  var terminal = document.getElementById('terminal');
  var node = start && start.nodeType === 1 ? start : (start && start.parentElement);
  while (node && node !== terminal) {
    var overflowY = "";
    try { overflowY = window.getComputedStyle(node).overflowY || ""; } catch(e) {}
    if (node.scrollHeight > node.clientHeight + 2 && /auto|scroll|overlay/i.test(overflowY)) return node;
    node = node.parentElement;
  }
  return null;
}

function getActiveScreenScrollElement() {
  var selectors = [
    '.content', '.pip-body', '.ping-wrap', '.audio-wrap', '.jobs-wrap', '.spark-wrap', '.tp-wrap',
    '.db2-wrap', '.db2-dossier', '.db-wrap', '.db-dossier', '.atk-dossier',
    '.news-wrap', '.comms-wrap', '.tape-wrap', '.map-dossier', '.atk-map-wrap',
    '.sidebar', '.text-body', '#screen'
  ];
  for (var i = 0; i < selectors.length; i++) {
    var el = document.querySelector(selectors[i]);
    if (el && el.scrollHeight > el.clientHeight + 2) return el;
  }
  return null;
}

function scrollElementByWheel(el, deltaY) {
  if (!el) return false;
  var maxScroll = Math.max(0, el.scrollHeight - el.clientHeight);
  if (maxScroll <= 0) return false;
  var before = el.scrollTop;
  var amount = deltaY;
  if (Math.abs(amount) < 32) amount = amount < 0 ? -32 : 32;
  el.scrollTop = Math.max(0, Math.min(maxScroll, el.scrollTop + amount));
  return el.scrollTop !== before;
}

function handleWheelScroll(e) {
  if (e.defaultPrevented) return;
  var activeEl = document.activeElement;
  if (activeEl && (activeEl.tagName === 'SELECT' || activeEl.type === 'number')) return;

  if (zoomMapByWheel(e)) return;

  var scrollTarget = getScrollableTerminalElement(e.target) || getActiveScreenScrollElement();
  if (scrollTarget && scrollElementByWheel(scrollTarget, e.deltaY)) {
    e.preventDefault();
    return;
  }

  // Keyboard-nav list screens still step selection when there is no overflow panel.
  if (screen === "factions" || screen === "radd" || screen === "notes" || screen === "holotapes") {
    var max = listMax();
    if (max > 0) {
      if (e.deltaY > 0) selected = Math.min(max - 1, selected + 1);
      else selected = Math.max(0, selected - 1);
      render();
      e.preventDefault();
      return;
    }
  }

  if (screen === "reports" || screen === "broadcast" || screen === "updates" || screen === "briefing") {
    if (e.deltaY > 0) scroll++;
    else scroll = Math.max(0, scroll - 1);
    render();
    e.preventDefault();
    return;
  }

  var fallback = document.querySelector('.content') || document.querySelector('.pip-body') || document.getElementById('screen');
  if (fallback && scrollElementByWheel(fallback, e.deltaY)) e.preventDefault();
}


function initializeTerminalWindowDrag() {
  if (!window.hamAPI || typeof window.hamAPI.moveWindowBy !== 'function') return;
  var zones = document.querySelectorAll('.terminal-drag-zone');
  zones.forEach(function(zone) {
    zone.addEventListener('pointerdown', function(e) {
      if (e.button !== undefined && e.button !== 0) return;
      e.preventDefault();
      var lastX = e.screenX;
      var lastY = e.screenY;
      var dragging = true;
      document.body.classList.add('terminal-window-dragging');
      try { zone.setPointerCapture(e.pointerId); } catch (err) {}

      function move(ev) {
        if (!dragging) return;
        var dx = ev.screenX - lastX;
        var dy = ev.screenY - lastY;
        if (dx || dy) {
          lastX = ev.screenX;
          lastY = ev.screenY;
          window.hamAPI.moveWindowBy(dx, dy).catch(function(){});
        }
      }

      function end(ev) {
        dragging = false;
        document.body.classList.remove('terminal-window-dragging');
        document.removeEventListener('pointermove', move, true);
        document.removeEventListener('pointerup', end, true);
        document.removeEventListener('pointercancel', end, true);
        try { zone.releasePointerCapture(ev.pointerId); } catch (err) {}
      }

      document.addEventListener('pointermove', move, true);
      document.addEventListener('pointerup', end, true);
      document.addEventListener('pointercancel', end, true);
    });
  });
}
